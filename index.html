    // ─────────────────────────────────────────────
    //  EMOTIONAL EXPLORATION FLOW
    // ─────────────────────────────────────────────
    function EmotionalFlowScreen({ onDone, onBack, onFindActivity }) {
      const today = todayStr();
      const [entryId] = useState(() => Date.now().toString());
      const [step, setStep] = useState(0); // 0=Q1, 1=Q2, 2=Q3, 3=Q4, 4=Q5, 5=closing
      const [branch, setBranch] = useState(null);
      const [q2Choice, setQ2Choice] = useState(null);
      const [answers, setAnswers] = useState({}); // {0: "text", 1: "option", 2: "text", ...}
      const [savedScreen, setSavedScreen] = useState(false);
      // Hoisted text state for all free-text steps (Rules of Hooks: no useState in conditionals)
      const [q1Text, setQ1Text] = useState('');
      const [q3Text, setQ3Text] = useState('');
      const [q4Text, setQ4Text] = useState('');
      const [q5Text, setQ5Text] = useState('');

      function detectBranch(text) {
        const t = text.toLowerCase();
        if (/stress|overwhelm|overwhelmed|busy|too much|boiling|spinning|exhausted|pressure/.test(t)) return 'stress';
        if (/sad|empty|low|numb|lost|grief|hopeless|down|depressed|blue/.test(t)) return 'sad';
        if (/anxious|anxiety|scared|worried|afraid|dread|nervous|panic|fear/.test(t)) return 'anxious';
        if (/angry|anger|frustrated|frustration|irritated|resentful|furious|annoyed|rage/.test(t)) return 'anger';
        if (/lonely|loneliness|invisible|unseen|disconnected|isolated|alone|missing/.test(t)) return 'lonely';
        return 'default';
      }

      const Q2_BY_BRANCH = {
        stress: {
          q: "When you say that — is it more that there's too much to do, or that you don't know where to start?",
          opts: ["Too much to do", "Don't know where to start", "Both equally"],
        },
        sad: {
          q: "Is this feeling tied to something specific that happened, or does it feel more like a general heaviness with no clear cause?",
          opts: ["Something specific happened", "General heaviness", "Not sure"],
        },
        anxious: {
          q: "What's underneath the anxiety — is it about something that might happen, or something you feel you're not handling well enough?",
          opts: ["Something that might happen", "Not handling something well enough", "Both"],
        },
        anger: {
          q: "Is the frustration pointed at someone specific, at a situation, or at yourself?",
          opts: ["Someone specific", "A situation", "Myself", "All of it"],
        },
        lonely: {
          q: "Is the loneliness about missing a specific person, or more about feeling unseen in your everyday life?",
          opts: ["Missing someone specific", "Feeling unseen generally", "Both"],
        },
        default: {
          q: "Is this feeling more physical — something you feel in your body — or more mental, a stream of thoughts you can't quiet?",
          opts: ["Physical / in my body", "Mental / in my head", "Both"],
        },
      };

      function getQ3() {
        const b = branch; const c = (q2Choice || '').toLowerCase();
        if (b === 'stress' && c.includes('too much')) return { type: 'text', q: "If you had to set everything down and pick the ONE thing weighing on you the most — not the most urgent, but the heaviest — what would it be?" };
        if (b === 'stress' && (c.includes("don't know") || c.includes('both'))) return { type: 'options', q: "What does the fog feel like — is it that everything feels equally important, or that nothing feels clear enough to act on?", opts: ["Everything feels equally important", "Nothing feels clear enough", "I'm afraid of choosing wrong"] };
        if (b === 'sad' && c.includes('specific')) return { type: 'text', q: "Do you want to name what happened? You don't have to, but sometimes just writing it down helps.", skippable: true };
        if (b === 'sad') return { type: 'options', q: "How long has this been sitting with you?", opts: ["A few days", "A few weeks", "Longer than I want to admit"] };
        if (b === 'anxious' && c.includes('might happen')) return { type: 'text', q: "What's the worst version of what you're afraid might happen? Say it plainly — naming the fear often shrinks it." };
        if (b === 'anxious') return { type: 'text', q: "What standard are you holding yourself to that you feel you're falling short of?" };
        if (b === 'anger' && c.includes('someone')) return { type: 'text', q: "What did they do — or not do — that crossed something important to you?" };
        if (b === 'anger' && c.includes('situation')) return { type: 'text', q: "What feels most unfair or wrong about it?" };
        if (b === 'anger' && c.includes('myself')) return { type: 'text', q: "What are you angry at yourself for? Try to say it without softening it." };
        if (b === 'anger') return { type: 'text', q: "What feels most unfair or wrong about it?" };
        if (b === 'lonely') return { type: 'text', q: "When did you last feel genuinely connected to someone? What was different then?" };
        if (b === 'default' && c.includes('physical')) return { type: 'text', q: "Where do you feel it in your body? Chest, shoulders, stomach, throat — somewhere else?" };
        return { type: 'options', q: "If you had to label this stream of thoughts — worry, regret, planning, replaying — what fits best?", opts: ["Worry about the future", "Replaying the past", "Trying to plan and control", "Comparing myself to others", "Other"] };
      }

      function getQ4() {
        const a3 = answers[2] || '';
        const b = branch;
        const c = (q2Choice || '').toLowerCase();
        if (b === 'anger' && c.includes('myself')) return "What would you say to a close friend who was feeling exactly what you just described?";
        if (a3 && a3.trim().length > 10) return "What does this situation reveal about something you need or value that isn't being met right now?";
        return "What do you think this feeling is trying to tell you — if it had a message, what would it be?";
      }

      function getQ5() {
        if (branch === 'stress')   return "What would it feel like to get the heaviest thing just 10% more done today — not finished, just moved? What would that one step be?";
        if (branch === 'sad')      return "What would feel like a small act of kindness toward yourself today?";
        if (branch === 'anxious')  return "What's one thing that is actually okay right now — something solid you can stand on?";
        if (branch === 'anger')    return "What do you need to let go of today, even temporarily, to give yourself some peace?";
        if (branch === 'lonely')   return "Is there one small way you could reach toward connection this week — even a tiny one?";
        return "What would feel like enough for today? Not perfect — just enough.";
      }

      function getClosingReflection() {
        if (branch === 'stress') return "You came in feeling overwhelmed, and what surfaced was one thing carrying most of the weight. You already know what would bring relief — you're just waiting for the space to act on it. That clarity matters.";
        if (branch === 'sad')    return "You came in carrying something heavy today. Naming it, even just here, is its own quiet form of courage.";
        if (branch === 'anxious') return "You came in with a lot of what-ifs swirling. You can't control everything — but you showed up and looked at it directly. That takes something.";
        if (branch === 'anger')  return "Something real got crossed today, and you felt it. Feelings like this usually point to something you care about. That's worth knowing.";
        if (branch === 'lonely') return "Loneliness is one of the quieter hard things. You named it today instead of pushing past it. That's not a small thing.";
        return "You took a moment to look inward today. Whatever is there — it deserved to be seen. You showed up for yourself.";
      }

      function autosaveEmotional(stepAnswers, branchOverride) {
        const flow = Object.entries(stepAnswers).map(([i, a]) => ({ step: Number(i), answer: a }));
        upsertEntryById(today, entryId, {
          date: today, flowType: 'emotional',
          emotionalFlow: flow, emotionalBranch: branchOverride !== undefined ? branchOverride : branch,
        });
      }

      function handleQ1(text) {
        const a = { ...answers, 0: text };
        setAnswers(a);
        const b = detectBranch(text);
        setBranch(b);
        autosaveEmotional(a, b);
        setStep(1);
      }

      function handleQ2Option(opt) {
        const a = { ...answers, 1: opt };
        setAnswers(a);
        setQ2Choice(opt);
        autosaveEmotional(a);
        setStep(2);
      }

      function handleQ3(val) {
        const a = { ...answers, 2: val };
        setAnswers(a);
        autosaveEmotional(a);
        setStep(3);
      }

      function handleQ4(text) {
        const a = { ...answers, 3: text };
        setAnswers(a);
        autosaveEmotional(a);
        setStep(4);
      }

      function handleQ5(text) {
        const a = { ...answers, 4: text };
        setAnswers(a);
        autosaveEmotional(a);
        setStep(5);
      }

      function handleSave() {
        const flow = Object.entries(answers).map(([i, a]) => ({ step: Number(i), answer: a }));
        upsertEntryById(today, entryId, {
          date: today, flowType: 'emotional',
          emotionalFlow: flow, emotionalBranch: branch,
        });
        setSavedScreen(true);
      }

      const textAreaStyle = { background: 'rgba(245,239,230,0.06)', border: '1px solid rgba(245,239,230,0.12)', borderRadius: '16px', padding: '18px', color: '#f5efe6', fontSize: '1rem', lineHeight: 1.7, resize: 'none', outline: 'none', width: '100%', boxSizing: 'border-box', minHeight: '200px', fontFamily: 'Inter, sans-serif' };
      const continueBtn = (onClick, label = 'Continue →') => (
        <button onClick={onClick}
          style={{ width: '100%', background: '#c4714f', color: '#f5efe6', border: 'none', borderRadius: '16px', padding: '16px', fontSize: '1rem', fontWeight: 600, cursor: 'pointer', fontFamily: 'Inter, sans-serif', boxShadow: '0 4px 20px rgba(196,113,79,0.3)', transition: 'all 0.2s ease', marginTop: '16px' }}
          onMouseEnter={e => e.currentTarget.style.background='#a35a3a'} onMouseLeave={e => e.currentTarget.style.background='#c4714f'}
        >{label}</button>
      );
      const optionBtn = (label, onClick) => (
        <button key={label} onClick={onClick}
          style={{ display: 'flex', alignItems: 'center', background: 'rgba(245,239,230,0.05)', border: '1px solid rgba(245,239,230,0.1)', borderRadius: '16px', padding: '16px 20px', cursor: 'pointer', textAlign: 'left', width: '100%', transition: 'all 0.2s ease', color: '#f5efe6', fontFamily: 'Inter, sans-serif', fontSize: '1rem', fontWeight: 500, marginBottom: '8px' }}
          onMouseEnter={e => { e.currentTarget.style.background='rgba(245,239,230,0.09)'; e.currentTarget.style.borderColor='rgba(196,113,79,0.5)'; }}
          onMouseLeave={e => { e.currentTarget.style.background='rgba(245,239,230,0.05)'; e.currentTarget.style.borderColor='rgba(245,239,230,0.1)'; }}
        >{label}</button>
      );
      const totalSteps = 5;
      const wrapStyle = { width: '100%', maxWidth: '480px', paddingTop: '28px', paddingBottom: '48px', paddingLeft: '20px', paddingRight: '20px', boxSizing: 'border-box' };

      // ── Saved screen
      if (savedScreen) {
        const phrase = getSupportivePhrase(null, null, null);
        const tw = getTimeWord();
        return (
          <div className="fade-in flex flex-col items-center justify-center px-5 text-center" style={{ maxWidth: '480px', width: '100%', minHeight: 'calc(100vh - 56px)', paddingTop: '40px', paddingBottom: '48px' }}>
            <h2 className="font-serif text-cream" style={{ fontSize: 'clamp(1.6rem, 6vw, 2.2rem)', fontWeight: 600, marginBottom: '16px' }}>Saved ✓</h2>
            <p className="font-serif" style={{ color: 'rgba(245,239,230,0.6)', fontSize: '1rem', fontStyle: 'italic', marginBottom: '12px', lineHeight: 1.65 }}>{getClosingReflection()}</p>
            <p className="font-serif" style={{ color: 'rgba(245,239,230,0.4)', fontSize: '0.95rem', fontStyle: 'italic', marginBottom: '40px', lineHeight: 1.65 }}>{phrase}</p>
            <div style={{ display: 'flex', flexDirection: 'column', gap: '12px', width: '100%' }}>
              <button onClick={onDone}
                style={{ width: '100%', background: '#c4714f', color: '#f5efe6', border: 'none', borderRadius: '16px', padding: '16px', fontSize: '1rem', fontWeight: 600, cursor: 'pointer', fontFamily: 'Inter, sans-serif', boxShadow: '0 4px 20px rgba(196,113,79,0.3)', transition: 'all 0.2s ease' }}
                onMouseEnter={e => e.currentTarget.style.background='#a35a3a'} onMouseLeave={e => e.currentTarget.style.background='#c4714f'}
              >Go to Journal</button>
            </div>
          </div>
        );
      }

      // ── Closing screen (before save)
      if (step === 5) {
        return (
          <div className="fade-in flex flex-col items-center justify-center px-5 text-center" style={{ maxWidth: '480px', width: '100%', minHeight: 'calc(100vh - 56px)', paddingTop: '40px', paddingBottom: '48px' }}>
            <p className="font-serif text-cream" style={{ fontSize: 'clamp(1.2rem,5vw,1.55rem)', fontStyle: 'italic', fontWeight: 500, lineHeight: 1.55, marginBottom: '40px' }}>{getClosingReflection()}</p>
            {continueBtn(handleSave, 'Save & finish')}
          </div>
        );
      }

      // ── Q1
      if (step === 0) {
        return (
          <div className="fade-in" style={wrapStyle}>
            <button onClick={onBack} style={{ background: 'none', border: 'none', color: 'rgba(245,239,230,0.4)', fontSize: '0.88rem', cursor: 'pointer', marginBottom: '20px', padding: 0, fontFamily: 'Inter, sans-serif', display: 'block' }}>← Back</button>
            <ProgressDots current={0} total={totalSteps} />
            <h2 className="font-serif text-cream" style={{ fontSize: 'clamp(1.2rem,5vw,1.5rem)', fontWeight: 500, fontStyle: 'italic', lineHeight: 1.5, marginBottom: '28px' }}>
              What's the loudest feeling you're carrying right now?
            </h2>
            <textarea value={q1Text} onChange={e => setQ1Text(e.target.value)} placeholder="Whatever comes up..." style={textAreaStyle} />
            {continueBtn(() => { if (q1Text.trim()) handleQ1(q1Text); })}
          </div>
        );
      }

      // ── Q2
      if (step === 1) {
        const b2 = branch || 'default';
        const q2 = Q2_BY_BRANCH[b2];
        return (
          <div className="fade-in" style={wrapStyle}>
            <button onClick={() => setStep(0)} style={{ background: 'none', border: 'none', color: 'rgba(245,239,230,0.4)', fontSize: '0.88rem', cursor: 'pointer', marginBottom: '20px', padding: 0, fontFamily: 'Inter, sans-serif', display: 'block' }}>← Back</button>
            <ProgressDots current={1} total={totalSteps} />
            <h2 className="font-serif text-cream" style={{ fontSize: 'clamp(1.2rem,5vw,1.5rem)', fontWeight: 500, fontStyle: 'italic', lineHeight: 1.5, marginBottom: '28px' }}>{q2.q}</h2>
            <div>{q2.opts.map(opt => optionBtn(opt, () => handleQ2Option(opt)))}</div>
          </div>
        );
      }

      // ── Q3
      if (step === 2) {
        const q3 = getQ3();
        return (
          <div className="fade-in" style={wrapStyle}>
            <button onClick={() => setStep(1)} style={{ background: 'none', border: 'none', color: 'rgba(245,239,230,0.4)', fontSize: '0.88rem', cursor: 'pointer', marginBottom: '20px', padding: 0, fontFamily: 'Inter, sans-serif', display: 'block' }}>← Back</button>
            <ProgressDots current={2} total={totalSteps} />
            <h2 className="font-serif text-cream" style={{ fontSize: 'clamp(1.2rem,5vw,1.5rem)', fontWeight: 500, fontStyle: 'italic', lineHeight: 1.5, marginBottom: '28px' }}>{q3.q}</h2>
            {q3.type === 'text' ? (
              <>
                <textarea value={q3Text} onChange={e => setQ3Text(e.target.value)} placeholder="Whatever comes up..." style={textAreaStyle} />
                <div style={{ display: 'flex', gap: '12px' }}>
                  {q3.skippable && (
                    <button onClick={() => handleQ3('')} style={{ marginTop: '16px', background: 'none', border: 'none', color: 'rgba(245,239,230,0.35)', fontSize: '0.88rem', cursor: 'pointer', fontFamily: 'Inter, sans-serif', padding: 0 }}>Skip</button>
                  )}
                  {continueBtn(() => handleQ3(q3Text))}
                </div>
              </>
            ) : (
              <div>{q3.opts.map(opt => optionBtn(opt, () => handleQ3(opt)))}</div>
            )}
          </div>
        );
      }

      // ── Q4
      if (step === 3) {
        return (
          <div className="fade-in" style={wrapStyle}>
            <button onClick={() => setStep(2)} style={{ background: 'none', border: 'none', color: 'rgba(245,239,230,0.4)', fontSize: '0.88rem', cursor: 'pointer', marginBottom: '20px', padding: 0, fontFamily: 'Inter, sans-serif', display: 'block' }}>← Back</button>
            <ProgressDots current={3} total={totalSteps} />
            <h2 className="font-serif text-cream" style={{ fontSize: 'clamp(1.2rem,5vw,1.5rem)', fontWeight: 500, fontStyle: 'italic', lineHeight: 1.5, marginBottom: '28px' }}>{getQ4()}</h2>
            <textarea value={q4Text} onChange={e => setQ4Text(e.target.value)} placeholder="Whatever comes up..." style={textAreaStyle} />
            {continueBtn(() => handleQ4(q4Text))}
          </div>
        );
      }

      // ── Q5
      if (step === 4) {
        return (
          <div className="fade-in" style={wrapStyle}>
            <button onClick={() => setStep(3)} style={{ background: 'none', border: 'none', color: 'rgba(245,239,230,0.4)', fontSize: '0.88rem', cursor: 'pointer', marginBottom: '20px', padding: 0, fontFamily: 'Inter, sans-serif', display: 'block' }}>← Back</button>
            <ProgressDots current={4} total={totalSteps} />
            <h2 className="font-serif text-cream" style={{ fontSize: 'clamp(1.2rem,5vw,1.5rem)', fontWeight: 500, fontStyle: 'italic', lineHeight: 1.5, marginBottom: '28px' }}>{getQ5()}</h2>
            <textarea value={q5Text} onChange={e => setQ5Text(e.target.value)} placeholder="Whatever comes up..." style={textAreaStyle} />
            {continueBtn(() => handleQ5(q5Text), 'Finish →')}
          </div>
        );
      }

      return null;
    }

    // ─────────────────────────────────────────────
    //  SUPPORTIVE PHRASE (post-journal save screen)
    // ─────────────────────────────────────────────
    function getSupportivePhrase(energyLevel, emotionTone, stressIntensity) {
      const pick = (arr) => arr[Math.floor(Math.random() * arr.length)];
      if (energyLevel === 'drained' || stressIntensity === 'high')
        return pick(["You showed up for yourself today. That matters.", "Even on the hardest days, you're here. That's enough."]);
      if (emotionTone === 'sad' || emotionTone === 'anxious')
        return pick(["It's okay to not be okay. You wrote it down. That's brave.", "Feelings aren't facts, but they deserve to be heard."]);
      if (emotionTone === 'hopeful' || energyLevel === 'good')
        return pick(["Hold onto that. You can come back to this feeling.", "Good days are worth celebrating, even quietly."]);
      return "One day at a time. You're doing it.";
    }

    // ─────────────────────────────────────────────
    //  JOURNAL SCREEN (two-phase flow)
    // ─────────────────────────────────────────────
    function JournalScreen({ onDone, onBack, onFindActivity }) {
      const today = todayStr();
      // Unique id for this journal session (so autosave creates one entry, not many)
      const [entryId] = useState(() => Date.now().toString());

      // ── Check-in state ────────────────────────────
      const [step, setStep] = useState(0);
      const [energyLevel,    setEnergyLevel]    = useState(null);
      const [mentalState,    setMentalState]    = useState(null);
      const [emotionTone,    setEmotionTone]    = useState(null);
      const [stressIntensity,setStressIntensity]= useState(null);

      // ── Prompt state ──────────────────────────────
      const [lightPrompts,   setLightPrompts]   = useState([]); // string[]
      const [deepPromptList, setDeepPromptList] = useState([]); // string[]
      const [promptAnswers,  setPromptAnswers]  = useState({});
      const [deepAnswers,    setDeepAnswers]    = useState({});
      const [deepPhase,      setDeepPhase]      = useState(null); // null | 'offer' | 'prompts'
      const [deepStep,       setDeepStep]       = useState(0);
      const [introMessage,   setIntroMessage]   = useState("Take a moment for yourself.");
      const [showClosing,    setShowClosing]     = useState(false);

      // ── UI state ──────────────────────────────────
      const [notes,        setNotes]        = useState('');
      const [saveConfirm,  setSaveConfirm]  = useState(false);
      const [deleteConfirm,setDeleteConfirm]= useState(false);
      const [savedScreen,  setSavedScreen]  = useState(false);

      // Steps: 0=Q1, 1=Q2, 2=Q3(emotion), 3=Q4(stress), 4=contextual intro, 5…=light prompts
      const totalDots = 4 + lightPrompts.length;

      // ── Entry helpers ─────────────────────────────
      function makePromptList() {
        const light = lightPrompts.map((q, i) => ({ question: q, answer: promptAnswers[i] || '', mode: 'light' }));
        const deep  = Object.keys(deepAnswers).length > 0
          ? deepPromptList.map((q, i) => ({ question: q, answer: deepAnswers[i] || '', mode: 'deep' }))
          : [];
        return [...light, ...deep];
      }

      function buildEntry() {
        return {
          id: entryId, date: today, flowType: 'checkin',
          createdAt: new Date().toISOString(),
          energyLevel, mentalState, emotionTone, stressIntensity,
          prompts: makePromptList(),
          notes: notes || '',
          recommendedActivity: null,
        };
      }

      function autosave(lightAns, deepAns) {
        upsertEntryById(today, entryId, {
          date: today, flowType: 'checkin',
          energyLevel, mentalState, emotionTone, stressIntensity,
          prompts: [
            ...lightPrompts.map((q, i) => ({ question: q, answer: (lightAns || promptAnswers)[i] || '', mode: 'light' })),
            ...(Object.keys(deepAns || deepAnswers).length > 0
              ? deepPromptList.map((q, i) => ({ question: q, answer: (deepAns || deepAnswers)[i] || '', mode: 'deep' }))
              : []),
          ],
          notes: notes || '',
          recommendedActivity: null,
        });
      }

      function handlePromptChange(idx, value) {
        const n = { ...promptAnswers, [idx]: value };
        setPromptAnswers(n);
        autosave(n, null);
      }

      function handleDeepPromptChange(idx, value) {
        const n = { ...deepAnswers, [idx]: value };
        setDeepAnswers(n);
        autosave(null, n);
      }

      // ── Check-in handlers ─────────────────────────
      function handleEnergySelect(value) { setEnergyLevel(value); setStep(1); }
      function handleMentalSelect(value) { setMentalState(value); setStep(2); }
      function handleEmotionSelect(value) { setEmotionTone(value); setStep(3); }

      function handleStressSelect(stressVal) {
        setStressIntensity(stressVal);

        // Load recent prompts (last 10)
        let recentTexts = [];
        try { const s = localStorage.getItem('journal_recent_prompts'); if (s) recentTexts = JSON.parse(s); } catch {}

        // Detect category
        const cat = detectCategory(energyLevel, mentalState, emotionTone, stressVal);

        // Select 2 light prompts + optional gratitude
        const lightBase = selectCategoryPrompts(cat, 'light', 2, recentTexts);
        const gratitude  = lightBase.length < 3 ? selectGratitudePrompt(emotionTone, stressVal) : null;
        const light = gratitude ? [...lightBase, gratitude] : lightBase;
        setLightPrompts(light);

        // Select up to 2 deep prompts
        const deep = selectCategoryPrompts(cat, 'deep', 2, [...recentTexts, ...light]);
        setDeepPromptList(deep);

        // Persist recently used (union of light + deep, capped at 10)
        const updated = [...new Set([...light, ...deep, ...recentTexts])].slice(0, 10);
        try { localStorage.setItem('journal_recent_prompts', JSON.stringify(updated)); } catch {}

        // Contextual intro message
        setIntroMessage(getContextualIntroMessage(emotionTone, mentalState, stressVal));
        setStep(4);
      }

      // ── Navigation ────────────────────────────────
      function goBack() {
        if (showClosing) return;
        if (deepPhase === 'prompts') {
          if (deepStep > 0) { setDeepStep(s => s - 1); return; }
          setDeepPhase('offer'); return;
        }
        if (deepPhase === 'offer') {
          setDeepPhase(null);
          setStep(4 + lightPrompts.length); // last light prompt
          return;
        }
        if (step === 1) setStep(0);
        else if (step === 2) setStep(1);
        else if (step === 3) setStep(2);
        else if (step === 5) setStep(3); // skip intro
        else if (step >= 6) setStep(step - 1);
      }

      function handleSaveAndDone() {
        upsertEntryById(today, entryId, buildEntry());
        setSavedScreen(true);
      }

      function handleDelete() {
        if (!deleteConfirm) { setDeleteConfirm(true); return; }
        deleteEntryById(today, entryId);
        onBack();
      }

      const Q1_OPTIONS = [
        { value: 'drained',  emoji: '🪫', label: 'Completely drained' },
        { value: 'tired',    emoji: '😴', label: 'Tired but okay' },
        { value: 'neutral',  emoji: '😐', label: 'Neutral' },
        { value: 'good',     emoji: '✨', label: 'Surprisingly good' },
      ];

      const Q2_OPTIONS = [
        { value: 'overstimulated', emoji: '🌀', label: 'Overstimulated' },
        { value: 'foggy',          emoji: '🌫️',  label: 'Foggy and kind of blank' },
        { value: 'clear',          emoji: '🙂', label: 'Clear enough' },
      ];

      const Q3_OPTIONS = [
        { value: 'hopeful',     emoji: '💛', label: 'Hopeful' },
        { value: 'good',        emoji: '🙂', label: 'Good' },
        { value: 'calm',        emoji: '😌', label: 'Calm' },
        { value: 'anxious',     emoji: '😬', label: 'Anxious' },
        { value: 'overwhelmed', emoji: '🌊', label: 'Overwhelmed' },
        { value: 'sad',         emoji: '😔', label: 'Sad' },
        { value: 'irritated',   emoji: '😤', label: 'Irritated' },
      ];

      const Q4_OPTIONS = [
        { value: 'low',    emoji: '🌿', label: 'Low' },
        { value: 'medium', emoji: '🌤️', label: 'Medium' },
        { value: 'high',   emoji: '🔥', label: 'High' },
      ];

      const optionBtn = {
        display: 'flex', alignItems: 'center', gap: '16px',
        background: 'rgba(245,239,230,0.05)', border: '1px solid rgba(245,239,230,0.1)',
        borderRadius: '16px', padding: '16px 20px', cursor: 'pointer',
        textAlign: 'left', width: '100%', transition: 'all 0.2s ease', color: '#f5efe6',
      };

      function renderPhaseOneQ(question, options, onSelect, dotIdx) {
        return (
          <div className="fade-in w-full px-5" style={{ maxWidth: '480px', paddingTop: '28px', paddingBottom: '48px' }}>
            {dotIdx > 0 && (
              <button onClick={goBack} style={{ background: 'none', border: 'none', color: 'rgba(245,239,230,0.4)', fontSize: '0.88rem', cursor: 'pointer', marginBottom: '16px', padding: 0, fontFamily: 'Inter, sans-serif', display: 'block' }}>
                ← Back
              </button>
            )}
            <ProgressDots current={dotIdx} total={totalDots} />
            <h2 className="font-serif text-cream text-center" style={{ fontSize: 'clamp(1.3rem, 5vw, 1.65rem)', fontWeight: 600, lineHeight: 1.4, marginBottom: '32px', paddingLeft: '8px', paddingRight: '8px' }}>
              {question}
            </h2>
            <div style={{ display: 'flex', flexDirection: 'column', gap: '12px' }}>
              {options.map(opt => (
                <button key={opt.value} onClick={() => onSelect(opt.value)} style={optionBtn}
                  onMouseEnter={e => { e.currentTarget.style.background = 'rgba(245,239,230,0.09)'; e.currentTarget.style.borderColor = 'rgba(196,113,79,0.5)'; e.currentTarget.style.transform = 'translateY(-1px)'; e.currentTarget.style.boxShadow = '0 4px 20px rgba(0,0,0,0.2)'; }}
                  onMouseLeave={e => { e.currentTarget.style.background = 'rgba(245,239,230,0.05)'; e.currentTarget.style.borderColor = 'rgba(245,239,230,0.1)'; e.currentTarget.style.transform = 'translateY(0)'; e.currentTarget.style.boxShadow = 'none'; }}
                >
                  <span style={{ fontSize: '1.6rem', width: '36px', textAlign: 'center', flexShrink: 0 }}>{opt.emoji}</span>
                  <span style={{ fontSize: '1rem', fontWeight: 500 }}>{opt.label}</span>
                </button>
              ))}
            </div>
          </div>
        );
      }

      // ── Saved confirmation screen ─────────────────
      if (savedScreen) {
        const phrase = getSupportivePhrase(energyLevel, emotionTone, stressIntensity);
        const tw = getTimeWord();
        return (
          <div className="fade-in flex flex-col items-center justify-center px-5 text-center" style={{ maxWidth: '480px', width: '100%', minHeight: 'calc(100vh - 56px)', paddingTop: '40px', paddingBottom: '48px' }}>
            <h2 className="font-serif text-cream" style={{ fontSize: 'clamp(1.6rem, 6vw, 2.2rem)', fontWeight: 600, marginBottom: '16px' }}>Saved ✓</h2>
            <p className="font-serif" style={{ color: 'rgba(245,239,230,0.45)', fontSize: '1rem', fontStyle: 'italic', marginBottom: '40px', lineHeight: 1.65 }}>{phrase}</p>
            <div style={{ display: 'flex', flexDirection: 'column', gap: '12px', width: '100%' }}>
              <button
                onClick={onDone}
                style={{ width: '100%', background: '#c4714f', color: '#f5efe6', border: 'none', borderRadius: '16px', padding: '16px', fontSize: '1rem', fontWeight: 600, cursor: 'pointer', fontFamily: 'Inter, sans-serif', boxShadow: '0 4px 20px rgba(196,113,79,0.3)', transition: 'all 0.2s ease' }}
                onMouseEnter={e => e.currentTarget.style.background='#a35a3a'}
                onMouseLeave={e => e.currentTarget.style.background='#c4714f'}
              >Go to Journal</button>
            </div>
          </div>
        );
      }

      // ── Check-in screens ──────────────────────────
      if (step === 0) return renderPhaseOneQ("How's your body feeling right now?", Q1_OPTIONS, handleEnergySelect, 0);
      if (step === 1) return renderPhaseOneQ(`How's your head ${getTimeWord()}?`, Q2_OPTIONS, handleMentalSelect, 1);
      if (step === 2) return renderPhaseOneQ("What emotion is closest right now?", Q3_OPTIONS, handleEmotionSelect, 2);
      if (step === 3) return renderPhaseOneQ("How intense does everything feel right now?", Q4_OPTIONS, handleStressSelect, 3);

      // ── Contextual intro ──────────────────────────
      if (step === 4) return <TransitionScreen message={introMessage} onAdvance={() => setStep(5)} />;

      // ── Closing screen ────────────────────────────
      if (showClosing) return (
        <div className="fade-in flex flex-col items-center justify-center px-5 text-center" style={{ maxWidth: '480px', width: '100%', minHeight: 'calc(100vh - 56px)', paddingTop: '40px', paddingBottom: '48px' }}>
          <h2 className="font-serif text-cream" style={{ fontSize: 'clamp(1.6rem, 6vw, 2.2rem)', fontWeight: 600, marginBottom: '12px' }}>
            That's yours for {getTimeWord()}.
          </h2>
          <p className="font-serif" style={{ color: 'rgba(245,239,230,0.5)', fontSize: '1rem', fontStyle: 'italic', marginBottom: '32px' }}>
            Anything else you want to add?
          </p>
          <div style={{ width: '100%', textAlign: 'left', marginBottom: '28px' }}>
            <p style={{ color: 'rgba(245,239,230,0.35)', fontSize: '0.72rem', fontWeight: 600, letterSpacing: '0.1em', textTransform: 'uppercase', marginBottom: '10px', fontFamily: 'Inter, sans-serif' }}>Notes</p>
            <textarea value={notes} onChange={e => setNotes(e.target.value)} placeholder="A thought, a moment, anything..."
              style={{ background: 'rgba(245,239,230,0.06)', border: '1px solid rgba(245,239,230,0.12)', borderRadius: '14px', padding: '16px', color: '#f5efe6', fontSize: '0.95rem', lineHeight: 1.65, resize: 'none', outline: 'none', width: '100%', boxSizing: 'border-box', minHeight: '120px', fontFamily: 'Inter, sans-serif' }}
            />
          </div>
          <div style={{ display: 'flex', flexDirection: 'column', gap: '12px', width: '100%' }}>
            <button onClick={handleSaveAndDone} disabled={saveConfirm}
              style={{ width: '100%', background: saveConfirm ? 'rgba(196,113,79,0.6)' : '#c4714f', color: '#f5efe6', border: 'none', borderRadius: '16px', padding: '16px', fontSize: '1rem', fontWeight: 600, cursor: saveConfirm ? 'default' : 'pointer', fontFamily: 'Inter, sans-serif', boxShadow: '0 4px 20px rgba(196,113,79,0.3)', transition: 'all 0.2s ease' }}
              onMouseEnter={e => { if (!saveConfirm) e.currentTarget.style.background = '#a35a3a'; }}
              onMouseLeave={e => { if (!saveConfirm) e.currentTarget.style.background = '#c4714f'; }}
            >{saveConfirm ? 'Saved ✓' : 'Save entry'}</button>
            <button onClick={handleDelete}
              style={{ width: '100%', background: deleteConfirm ? 'rgba(232,152,122,0.1)' : 'transparent', color: deleteConfirm ? '#e8987a' : 'rgba(245,239,230,0.35)', border: deleteConfirm ? '1px solid rgba(232,152,122,0.4)' : '1px solid rgba(245,239,230,0.1)', borderRadius: '16px', padding: '15px', fontSize: '0.95rem', fontWeight: 500, cursor: 'pointer', fontFamily: 'Inter, sans-serif', transition: 'all 0.2s ease' }}
            >{deleteConfirm ? 'Confirm delete?' : 'Delete this entry'}</button>
          </div>
        </div>
      );

      // ── Deep mode offer ───────────────────────────
      if (deepPhase === 'offer') return (
        <div className="fade-in flex flex-col items-center justify-center px-6 text-center" style={{ maxWidth: '480px', width: '100%', minHeight: 'calc(100vh - 56px)', paddingTop: '32px', paddingBottom: '48px' }}>
          <button onClick={goBack} style={{ alignSelf: 'flex-start', background: 'none', border: 'none', color: 'rgba(245,239,230,0.4)', fontSize: '0.88rem', cursor: 'pointer', marginBottom: '32px', padding: 0, fontFamily: 'Inter, sans-serif' }}>← Back</button>
          <p className="font-serif text-cream" style={{ fontSize: 'clamp(1.4rem, 5vw, 1.8rem)', fontStyle: 'italic', fontWeight: 500, marginBottom: '14px', lineHeight: 1.45 }}>
            Want to go a bit deeper {getTimeWord()}?
          </p>
          <p style={{ color: 'rgba(245,239,230,0.42)', fontSize: '0.95rem', fontFamily: 'Inter, sans-serif', marginBottom: '40px', lineHeight: 1.6 }}>
            A couple of questions to go beneath the surface.
          </p>
          <div style={{ display: 'flex', flexDirection: 'column', gap: '12px', width: '100%' }}>
            <button
              onClick={() => { setDeepPhase('prompts'); setDeepStep(0); }}
              style={{ width: '100%', background: '#c4714f', color: '#f5efe6', border: 'none', borderRadius: '16px', padding: '16px', fontSize: '1rem', fontWeight: 600, cursor: 'pointer', fontFamily: 'Inter, sans-serif', boxShadow: '0 4px 20px rgba(196,113,79,0.3)', transition: 'all 0.2s ease' }}
              onMouseEnter={e => e.currentTarget.style.background='#a35a3a'} onMouseLeave={e => e.currentTarget.style.background='#c4714f'}
            >Yes, let's go</button>
            <button
              onClick={() => setShowClosing(true)}
              style={{ width: '100%', background: 'transparent', color: 'rgba(245,239,230,0.45)', border: '1px solid rgba(245,239,230,0.15)', borderRadius: '16px', padding: '15px', fontSize: '0.95rem', fontWeight: 500, cursor: 'pointer', fontFamily: 'Inter, sans-serif', transition: 'all 0.2s ease' }}
              onMouseEnter={e => { e.currentTarget.style.borderColor='rgba(245,239,230,0.35)'; e.currentTarget.style.color='rgba(245,239,230,0.75)'; }}
              onMouseLeave={e => { e.currentTarget.style.borderColor='rgba(245,239,230,0.15)'; e.currentTarget.style.color='rgba(245,239,230,0.45)'; }}
            >Not now</button>
          </div>
        </div>
      );

      // ── Deep prompts ──────────────────────────────
      if (deepPhase === 'prompts') {
        const question = deepPromptList[deepStep];
        const isLastDeep = deepStep === deepPromptList.length - 1;
        return (
          <div className="fade-in w-full px-5" style={{ maxWidth: '480px', paddingTop: '28px', paddingBottom: '48px' }}>
            <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: '20px' }}>

            </div>
            <h2 className="font-serif text-cream" style={{ fontSize: 'clamp(1.2rem, 5vw, 1.5rem)', fontWeight: 500, fontStyle: 'italic', lineHeight: 1.5, marginBottom: '28px' }}>
              {question}
            </h2>
            <textarea
              value={deepAnswers[deepStep] || ''}
              onChange={e => handleDeepPromptChange(deepStep, e.target.value)}
              placeholder="Whatever comes up..."
              style={{ background: 'rgba(245,239,230,0.06)', border: '1px solid rgba(245,239,230,0.12)', borderRadius: '16px', padding: '18px', color: '#f5efe6', fontSize: '1rem', lineHeight: 1.7, resize: 'none', outline: 'none', width: '100%', boxSizing: 'border-box', minHeight: '220px', fontFamily: 'Inter, sans-serif' }}
            />
            <button
              onClick={() => { if (isLastDeep) setShowClosing(true); else setDeepStep(s => s + 1); }}
              style={{ width: '100%', background: '#c4714f', color: '#f5efe6', border: 'none', borderRadius: '16px', padding: '16px', fontSize: '1rem', fontWeight: 600, cursor: 'pointer', fontFamily: 'Inter, sans-serif', boxShadow: '0 4px 20px rgba(196,113,79,0.3)', transition: 'all 0.2s ease', marginTop: '16px' }}
              onMouseEnter={e => e.currentTarget.style.background='#a35a3a'} onMouseLeave={e => e.currentTarget.style.background='#c4714f'}
            >{isLastDeep ? 'Finish →' : 'Continue →'}</button>
          </div>
        );
      }

      // ── Light prompts ─────────────────────────────
      if (step >= 5) {
        const promptIdx = step - 5;
        const question  = lightPrompts[promptIdx];
        const dotIdx    = 4 + promptIdx;
        const isLastLight = promptIdx === lightPrompts.length - 1;
        return (
          <div className="fade-in w-full px-5" style={{ maxWidth: '480px', paddingTop: '28px', paddingBottom: '48px' }}>

            <h2 className="font-serif text-cream" style={{ fontSize: 'clamp(1.2rem, 5vw, 1.5rem)', fontWeight: 500, fontStyle: 'italic', lineHeight: 1.5, marginBottom: '28px' }}>
              {question}
            </h2>
            <textarea
              value={promptAnswers[promptIdx] || ''}
              onChange={e => handlePromptChange(promptIdx, e.target.value)}
              placeholder="Whatever comes up..."
              style={{ background: 'rgba(245,239,230,0.06)', border: '1px solid rgba(245,239,230,0.12)', borderRadius: '16px', padding: '18px', color: '#f5efe6', fontSize: '1rem', lineHeight: 1.7, resize: 'none', outline: 'none', width: '100%', boxSizing: 'border-box', minHeight: '220px', fontFamily: 'Inter, sans-serif' }}
            />
            <button
              onClick={() => {
                if (!isLastLight) { setStep(step + 1); return; }
                if (deepPromptList.length > 0) setDeepPhase('offer'); else setShowClosing(true);
              }}
              style={{ width: '100%', background: '#c4714f', color: '#f5efe6', border: 'none', borderRadius: '16px', padding: '16px', fontSize: '1rem', fontWeight: 600, cursor: 'pointer', fontFamily: 'Inter, sans-serif', boxShadow: '0 4px 20px rgba(196,113,79,0.3)', transition: 'all 0.2s ease', marginTop: '16px' }}
              onMouseEnter={e => e.currentTarget.style.background='#a35a3a'} onMouseLeave={e => e.currentTarget.style.background='#c4714f'}
            >Continue →</button>
          </div>
        );
      }

      return null;
    }

    // ─────────────────────────────────────────────
    //  INTENTION HELPERS
    // ─────────────────────────────────────────────
    function getWeekNumber(d) {
      const date = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
      const dayNum = date.getUTCDay() || 7;
      date.setUTCDate(date.getUTCDate() + 4 - dayNum);
      const yearStart = new Date(Date.UTC(date.getUTCFullYear(), 0, 1));
      return Math.ceil((((date - yearStart) / 86400000) + 1) / 7);
    }
    function getWeekKey(d) {
      return `intention_week_${d.getFullYear()}-${String(getWeekNumber(d)).padStart(2,'0')}`;
    }
    function getMonthKey(year, month) {
      return `intention_month_${year}-${String(month+1).padStart(2,'0')}`;
    }
    function getWeekStart(d) {
      const date = new Date(d);
      const day  = date.getDay();
      const diff = date.getDate() - day + (day === 0 ? -6 : 1);
      return new Date(date.getFullYear(), date.getMonth(), diff);
    }
    function loadIntention(key) {
      try { const s = localStorage.getItem(key); return s ? JSON.parse(s) : null; } catch { return null; }
    }
    function saveIntentionData(key, data) {
      try { localStorage.setItem(key, JSON.stringify(data)); } catch {}
    }

      // ── Review state ──────────────────────────────
      const [reviewType,      setReviewType]      = useState(null);
      const [reviewStep,      setReviewStep]      = useState(0);
      const [reviewAnswers,   setReviewAnswers]   = useState({});

      const [intNavMonth, setIntNavMonth] = useState(now.getMonth());
      const [revNavYear,  setRevNavYear]  = useState(now.getFullYear());
      const [revNavMonth, setRevNavMonth] = useState(now.getMonth());

      // ── Force re-read of intentions/reviews ───────
      const [intRefresh,  setIntRefresh]  = useState(0);

      // ── Review intent key ─────────────────────────
      const [reviewIntKey, setReviewIntKey] = useState(null);

      // ── Existing helpers (unchanged logic) ────────
      const today = todayStr();

      function getAllJournalKeys() {
        const keys = [];
        for (let i = 0; i < localStorage.length; i++) {
          const k = localStorage.key(i);
          if (k && k.startsWith('journal_')) keys.push(k);
        }
        return keys;
      }

      function getEntryForDate(year, month, day) {
        // Returns first checkin entry for tint colour (backwards compat)
        const ds = `${year}-${String(month+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
        return loadJournalEntry(ds);
      }

      function getEntriesForDate(year, month, day) {
        const ds = `${year}-${String(month+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
        return loadJournalEntries(ds);
      }

      function prevMonth() {
        if (calMonth === 0) { setCalYear(y => y - 1); setCalMonth(11); }
        else setCalMonth(m => m - 1);
        setSelectedDay(null); setDeleteConfirm(false); setEditMode(false); setEditData(null);
      }
      function nextMonth() {
        if (calMonth === 11) { setCalYear(y => y + 1); setCalMonth(0); }
        else setCalMonth(m => m + 1);
        setSelectedDay(null); setDeleteConfirm(false); setEditMode(false); setEditData(null);
      }

      const MONTH_NAMES = ['January','February','March','April','May','June','July','August','September','October','November','December'];
      const DAY_NAMES   = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];

      const firstDowRaw = new Date(calYear, calMonth, 1).getDay(); // 0=Sun
      const firstDow    = (firstDowRaw + 6) % 7;                   // 0=Mon
      const daysInMonth = new Date(calYear, calMonth + 1, 0).getDate();
      const cells = [];
      for (let i = 0; i < firstDow; i++) cells.push(null);
      for (let d = 1; d <= daysInMonth; d++) cells.push(d);

      function exportJournal() {
        const keys = getAllJournalKeys().sort();
        if (keys.length === 0) { alert('No journal entries yet.'); return; }
        let text = 'Tonight — Journal Export\n' + '='.repeat(30) + '\n\n';
        keys.forEach(k => {
          try {
            const entry = JSON.parse(localStorage.getItem(k));
            if (!entry) return;
            const d = new Date(entry.date + 'T12:00:00');
            text += `${d.toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' })}\n`;
            text += '-'.repeat(30) + '\n';
            if (entry.energyLevel) text += `Energy: ${entry.energyLevel}\n`;
            if (entry.mentalState) text += `Mental state: ${entry.mentalState}\n`;
            if (entry.prompts && entry.prompts.length > 0) {
              entry.prompts.forEach(p => { text += `\nPrompt: ${p.question}\n${p.answer || '(no answer)'}\n`; });
            }
            text += '\n\n';
          } catch {}
        });
        const blob = new Blob([text], { type: 'text/plain' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = 'tonight-journal.txt';
        document.body.appendChild(a); a.click();
        document.body.removeChild(a); URL.revokeObjectURL(url);
      }

      function clearAllEntries() {
        if (!confirmClear) { setConfirmClear(true); return; }
        getAllJournalKeys().forEach(k => localStorage.removeItem(k));
        setConfirmClear(false); setSelectedDay(null); setDeleteConfirm(false); setEditMode(false); setEditData(null); setEntryDates(new Set());
      }

      const selectedDateStr  = selectedDay ? `${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(selectedDay).padStart(2,'0')}` : null;
      const selectedEntry    = selectedDay ? getEntryForDate(calYear, calMonth, selectedDay) : null;
      const [calEntries,     setCalEntries]   = useState([]);
      const [calExpandedId,  setCalExpandedId]= useState(null);
      const [calEditingId,   setCalEditingId] = useState(null);
      const [calDelConfirm,  setCalDelConfirm]= useState(null);

      // Reload calendar entries whenever selected day changes
      useEffect(() => {
        if (selectedDateStr) { setCalEntries(loadJournalEntries(selectedDateStr)); setCalExpandedId(null); setCalEditingId(null); setCalDelConfirm(null); }
        else setCalEntries([]);
      }, [selectedDateStr]);

      function reloadCalEntries() { if (selectedDateStr) setCalEntries(loadJournalEntries(selectedDateStr)); }

      function handleDeleteEntry(entryId) {
        if (calDelConfirm !== entryId) { setCalDelConfirm(entryId); return; }
        if (selectedDateStr) {
          deleteEntryById(selectedDateStr, entryId);
          reloadCalEntries();
          const remaining = loadJournalEntries(selectedDateStr);
          if (remaining.length === 0) {
            const nd = new Set(entryDates); nd.delete(selectedDateStr); setEntryDates(nd);
            setSelectedDay(null);
          }
        }
        setCalDelConfirm(null); setCalEditingId(null); setEditData(null);
        if (calExpandedId === entryId) setCalExpandedId(null);
      }

      function enterEditMode(entry) {
        setEditData({ energyLevel: entry?.energyLevel||'', mentalState: entry?.mentalState||'', prompts: (entry?.prompts||[]).map(p=>({...p})), notes: entry?.notes||'' });
        setCalEditingId(entry?.id);
        setCalDelConfirm(null);
      }

      function handleSaveEdit(entry) {
        if (!selectedDateStr || !editData || !entry) return;
        upsertEntryById(selectedDateStr, entry.id, { ...entry, ...editData });
        reloadCalEntries(); setCalEditingId(null); setEditData(null);
      }

      function formatDateNice(dateStr) {
        if (!dateStr) return '';
        const d = new Date(dateStr + 'T12:00:00');
        return d.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });
      }

      const energyEmoji = { drained: '🪫', tired: '😴', neutral: '😐', good: '✨' };
      const energyLabel = { drained: 'Completely drained', tired: 'Tired but okay', neutral: 'Neutral', good: 'Surprisingly good' };
      const mentalEmoji = { overstimulated: '🌀', foggy: '🌫️', clear: '🙂' };
      const mentalLabel = { overstimulated: 'Overstimulated', foggy: 'Foggy and kind of blank', clear: 'Clear enough' };
      const emotionEmoji = { anxious: '😬', overwhelmed: '🌊', sad: '😔', irritated: '😤', calm: '😌', good: '🙂', hopeful: '💛' };
      const emotionLabel = { anxious: 'Anxious', overwhelmed: 'Overwhelmed', sad: 'Sad', irritated: 'Irritated', calm: 'Calm', good: 'Good', hopeful: 'Hopeful' };
      const stressEmoji  = { low: '🌿', medium: '🌤️', high: '🔥' };
      const stressLabel  = { low: 'Low intensity', medium: 'Medium intensity', high: 'High intensity' };

      // ── Energy tints for calendar cells ───────────
      const ENERGY_TINTS = {
        good:    { bg: '#D6ECD2', text: '#2E6B27', label: 'Good' },
        neutral: { bg: '#FAE8D0', text: '#854F0B', label: 'Okay' },
        tired:   { bg: '#FAE8D0', text: '#854F0B', label: 'Tired' },
        drained: { bg: '#F5DDD8', text: '#712B13', label: 'Low'  },
      };

      // ── Review data ───────────────────────────────
      const WEEK_QUESTIONS = [
        { type: 'options', q: 'Did this week feel like you intended it to?', options: ['Fully','Mostly','Not really'], hasText: true, textPlaceholder: 'Tell me more...' },
        { type: 'text',    q: 'What was the hardest moment this week?' },
        { type: 'text',    q: 'What was the most nourishing moment?' },
        { type: 'options', q: 'Did you show up for yourself this week?',     options: ['Yes','Sometimes','Not really'] },
        { type: 'text',    q: 'What do you want to carry into next week?' },
        { type: 'word',    q: 'One word for how this week felt.' },
      ];
      const MONTH_QUESTIONS = [
        { type: 'text',    q: 'In one sentence, how was this month?' },
        { type: 'options', q: 'Did you live your intention?', options: ['Fully','Partially','Not really'], hasText: true, textPlaceholder: 'What got in the way, or what helped?' },
        { type: 'text',    q: 'What surprised you most this month?' },
        { type: 'text',    q: 'What did you let go of?' },
        { type: 'text',    q: 'What are you most proud of, even quietly?' },
        { type: 'text',    q: 'What do you want more of next month?' },
        { type: 'text',    q: 'What do you want less of?' },
        { type: 'word',    q: 'One word or image that captures this month.' },
      ];

      const reviewQuestions = reviewType === 'week' ? WEEK_QUESTIONS : (reviewType === 'month' ? MONTH_QUESTIONS : []);

      function startReview(type, intKey, existingAnswers) {
        setReviewType(type);
        setReviewIntKey(intKey || (type === 'week' ? weekKey : monthKey));
        setReviewStep(0);
        setReviewAnswers(existingAnswers || {});
        setReviewSaved(false);
        setReviewExitAsk(false);
      }
      function closeReview()       { setReviewType(null); setReviewExitAsk(false); }
      function requestExitReview() { setReviewExitAsk(true); }

      function reviewGoNext() {
        if (reviewStep < reviewQuestions.length - 1) {
          setReviewFading(true);
          setTimeout(() => { setReviewStep(s => s + 1); setReviewFading(false); }, 200);
        }
      }
      function reviewGoBack() {
        if (reviewStep > 0) {
          setReviewFading(true);
          setTimeout(() => { setReviewStep(s => s - 1); setReviewFading(false); }, 200);
        }
      }
      function selectOptionAndMaybeAdvance(opt) {
        const q = reviewQuestions[reviewStep];
        setReviewAnswers(prev => ({ ...prev, [reviewStep]: { ...(prev[reviewStep]||{}), option: opt } }));
        if (!q.hasText && reviewStep < reviewQuestions.length - 1) {
          setReviewFading(true);
          setTimeout(() => { setReviewStep(s => s + 1); setReviewFading(false); }, 280);
        }
      }
      function handleSaveReview() {
        const key = reviewIntKey || (reviewType === 'week' ? weekKey : monthKey);
        const suffix = key.replace(`intention_${reviewType}_`, '');
        saveIntentionData(`review_${reviewType}_${suffix}`, { type: reviewType, date: new Date().toISOString(), answers: reviewAnswers });
        setReviewSaved(true);
        setIntRefresh(r => r+1);
        setTimeout(closeReview, 1200);
      }

      // ── Derived display values ────────────────────
      const weekStart      = getWeekStart(now);
      const weekStartLabel = weekStart.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });

      // ── Left/right column helpers ─────────────────
      // Returns array of { weekKey, label, weekStart } for weeks whose Monday (start) falls in the given year/month
      function getWeeksForMonth(year, month) {
        const weeks = [];
        const seen = new Set();
        const daysInM = new Date(year, month + 1, 0).getDate();
        for (let d = 1; d <= daysInM; d++) {
          const date = new Date(year, month, d);
          const ws = getWeekStart(date);
          // Only include this week if its Monday falls within the selected month
          if (ws.getFullYear() === year && ws.getMonth() === month) {
            const wk = getWeekKey(ws);
            if (!seen.has(wk)) {
              seen.add(wk);
              const label = ws.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
              weeks.push({ weekKey: wk, label, weekStart: ws });
            }
          }
        }
        return weeks;
      }

      function loadReviewForKey(type, intKey) {
        const suffix = intKey.replace(`intention_${type}_`, '');
        return loadIntention(`review_${type}_${suffix}`);
      }

      // ── Review overlay ────────────────────────────
      function renderReviewOverlay() {
        if (!reviewType) return null;
        const q      = reviewQuestions[reviewStep];
        const isLast = reviewStep === reviewQuestions.length - 1;
        const cur    = reviewAnswers[reviewStep] || {};

        return (
          <div style={{ position: 'absolute', inset: 0, background: '#1a1a2e', display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', zIndex: 50, padding: '32px 24px', opacity: reviewFading ? 0 : 1, transition: 'opacity 0.2s ease' }}>
            {/* Exit button top-right */}
            <button onClick={requestExitReview} style={{ position: 'absolute', top: '18px', right: '20px', background: 'none', border: 'none', color: 'rgba(245,239,230,0.3)', fontSize: '1.2rem', cursor: 'pointer', lineHeight: 1, padding: '4px 8px', transition: 'color 0.2s' }}
              onMouseEnter={e => e.currentTarget.style.color='rgba(245,239,230,0.65)'}
              onMouseLeave={e => e.currentTarget.style.color='rgba(245,239,230,0.3)'}
            >×</button>

            {/* Exit confirm */}
            {reviewExitAsk && (
              <div style={{ position: 'absolute', inset: 0, background: 'rgba(26,26,46,0.92)', display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', zIndex: 10, gap: '16px' }}>
                <p className="font-serif" style={{ color: 'rgba(245,239,230,0.7)', fontSize: '1.05rem', fontStyle: 'italic' }}>Leave without saving?</p>
                <div style={{ display: 'flex', gap: '12px' }}>
                  <button onClick={closeReview} style={{ background: 'transparent', border: '1px solid rgba(245,239,230,0.2)', borderRadius: '12px', padding: '11px 24px', color: 'rgba(245,239,230,0.55)', fontSize: '0.88rem', cursor: 'pointer', fontFamily: 'Inter, sans-serif', transition: 'all 0.2s' }}
                    onMouseEnter={e => { e.currentTarget.style.borderColor='rgba(245,239,230,0.4)'; e.currentTarget.style.color='rgba(245,239,230,0.85)'; }}
                    onMouseLeave={e => { e.currentTarget.style.borderColor='rgba(245,239,230,0.2)'; e.currentTarget.style.color='rgba(245,239,230,0.55)'; }}
                  >Yes, exit</button>
                  <button onClick={() => setReviewExitAsk(false)} style={{ background: '#c4714f', border: 'none', borderRadius: '12px', padding: '11px 24px', color: '#f5efe6', fontSize: '0.88rem', fontWeight: 600, cursor: 'pointer', fontFamily: 'Inter, sans-serif', transition: 'background 0.2s' }}
                    onMouseEnter={e => e.currentTarget.style.background='#a35a3a'}
                    onMouseLeave={e => e.currentTarget.style.background='#c4714f'}
                  >Keep going</button>
                </div>
              </div>
            )}

            <div style={{ width: '100%', maxWidth: '480px' }}>
              <ProgressDots current={reviewStep} total={reviewQuestions.length} />

              {reviewStep > 0 && (
                <button onClick={reviewGoBack} style={{ background: 'none', border: 'none', color: 'rgba(245,239,230,0.4)', fontSize: '0.88rem', cursor: 'pointer', marginBottom: '16px', padding: 0, fontFamily: 'Inter, sans-serif', display: 'block' }}>← Back</button>
              )}

              <h2 className="font-serif text-cream" style={{ fontSize: q.type === 'word' ? 'clamp(1.6rem,5vw,2.1rem)' : 'clamp(1.2rem,4vw,1.5rem)', fontWeight: 600, lineHeight: 1.4, marginBottom: '26px' }}>
                {q.q}
              </h2>

              {q.type === 'options' && (
                <div style={{ display: 'flex', flexDirection: 'column', gap: '10px', marginBottom: q.hasText ? '18px' : '0' }}>
                  {q.options.map(opt => {
                    const sel = cur.option === opt;
                    return (
                      <button key={opt} onClick={() => selectOptionAndMaybeAdvance(opt)}
                        style={{ display: 'flex', alignItems: 'center', background: sel ? 'rgba(196,113,79,0.14)' : 'rgba(245,239,230,0.05)', border: sel ? '1px solid rgba(196,113,79,0.55)' : '1px solid rgba(245,239,230,0.1)', borderRadius: '14px', padding: '14px 18px', cursor: 'pointer', color: '#f5efe6', textAlign: 'left', width: '100%', fontFamily: 'Inter, sans-serif', fontSize: '0.95rem', fontWeight: 500, transition: 'all 0.15s' }}
                      >{opt}</button>
                    );
                  })}
                </div>
              )}

              {(q.type === 'text' || (q.type === 'options' && q.hasText)) && (
                <textarea
                  value={cur.text || ''}
                  onChange={e => setReviewAnswers(prev => ({ ...prev, [reviewStep]: { ...(prev[reviewStep]||{}), text: e.target.value } }))}
                  placeholder={q.type === 'options' ? (q.textPlaceholder || 'Tell me more...') : 'Write here...'}
                  rows={q.type === 'options' ? 3 : 4}
                  style={{ width: '100%', boxSizing: 'border-box', background: 'rgba(245,239,230,0.06)', border: '1px solid rgba(245,239,230,0.12)', borderRadius: '14px', padding: '14px 16px', color: '#f5efe6', fontSize: '0.95rem', lineHeight: 1.65, resize: 'none', outline: 'none', fontFamily: 'Inter, sans-serif' }}
                />
              )}

              {q.type === 'word' && (
                <input value={cur.text || ''} onChange={e => setReviewAnswers(prev => ({ ...prev, [reviewStep]: { ...(prev[reviewStep]||{}), text: e.target.value } }))} placeholder="..."
                  style={{ width: '100%', boxSizing: 'border-box', background: 'rgba(245,239,230,0.06)', border: '1px solid rgba(245,239,230,0.12)', borderRadius: '14px', padding: '18px 20px', color: '#f5efe6', fontSize: '1.6rem', fontFamily: 'Lora, serif', fontStyle: 'italic', outline: 'none' }}
                />
              )}

              <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginTop: '24px' }}>
                {!isLast && q.type !== 'options' && (
                  <button onClick={reviewGoNext} style={{ background: 'none', border: 'none', color: 'rgba(245,239,230,0.28)', fontSize: '0.82rem', cursor: 'pointer', fontFamily: 'Inter, sans-serif', padding: 0 }}>Skip</button>
                )}
                {(isLast || q.type === 'options') && !isLast && <div />}
                {!isLast ? (
                  <button onClick={reviewGoNext}
                    style={{ background: '#c4714f', color: '#f5efe6', border: 'none', borderRadius: '14px', padding: '13px 28px', fontSize: '0.95rem', fontWeight: 600, cursor: 'pointer', fontFamily: 'Inter, sans-serif', marginLeft: 'auto' }}
                    onMouseEnter={e => e.currentTarget.style.background='#a35a3a'}
                    onMouseLeave={e => e.currentTarget.style.background='#c4714f'}
                  >Continue →</button>
                ) : (
                  <button onClick={handleSaveReview} disabled={reviewSaved}
                    style={{ width: '100%', background: reviewSaved ? 'rgba(196,113,79,0.55)' : '#c4714f', color: '#f5efe6', border: 'none', borderRadius: '14px', padding: '14px', fontSize: '0.95rem', fontWeight: 600, cursor: reviewSaved ? 'default' : 'pointer', fontFamily: 'Inter, sans-serif', marginTop: '8px' }}
                  >{reviewSaved ? 'Saved ✓' : 'Save review'}</button>
                )}
              </div>
            </div>
          </div>
        );
      }

      // ── Main render ───────────────────────────────
      const intMonthKey = getMonthKey(intNavYear, intNavMonth);
      const intWeeks    = getWeeksForMonth(intNavYear, intNavMonth);
      const revMonthKey = getMonthKey(revNavYear, revNavMonth);
      const revWeeks    = getWeeksForMonth(revNavYear, revNavMonth);

      function NavArrows({ onPrev, onNext, label }) {
        return (
          <div style={{ display:'flex', alignItems:'center', gap:'4px' }}>
            <button onClick={onPrev} style={{ background:'none', border:'none', color:'rgba(245,239,230,0.38)', fontSize:'1rem', cursor:'pointer', padding:'2px 6px', lineHeight:1 }}
              onMouseEnter={e=>e.currentTarget.style.color='rgba(245,239,230,0.7)'}
              onMouseLeave={e=>e.currentTarget.style.color='rgba(245,239,230,0.38)'}
            >‹</button>
            <span style={{ color:'rgba(245,239,230,0.55)', fontSize:'0.74rem', fontFamily:'Inter, sans-serif', minWidth:'88px', textAlign:'center' }}>{label}</span>
            <button onClick={onNext} style={{ background:'none', border:'none', color:'rgba(245,239,230,0.38)', fontSize:'1rem', cursor:'pointer', padding:'2px 6px', lineHeight:1 }}
              onMouseEnter={e=>e.currentTarget.style.color='rgba(245,239,230,0.7)'}
              onMouseLeave={e=>e.currentTarget.style.color='rgba(245,239,230,0.38)'}
            >›</button>
          </div>
        );
      }

      function prevIntMonth() { if(intNavMonth===0){setIntNavYear(y=>y-1);setIntNavMonth(11);}else setIntNavMonth(m=>m-1); }
      function nextIntMonth() { if(intNavMonth===11){setIntNavYear(y=>y+1);setIntNavMonth(0);}else setIntNavMonth(m=>m+1); }
      function prevRevMonth() { if(revNavMonth===0){setRevNavYear(y=>y-1);setRevNavMonth(11);}else setRevNavMonth(m=>m-1); }
      function nextRevMonth() { if(revNavMonth===11){setRevNavYear(y=>y+1);setRevNavMonth(0);}else setRevNavMonth(m=>m+1); }

      return (
        <div style={{ width:'100%', height:'calc(100vh - 56px)', display:'flex', position:'relative', overflow:'hidden' }}>

          {/* ── Left panel ── */}
          <div className="journal-left-panel" style={{ width:'400px', flexShrink:0, borderRight:'0.5px solid rgba(245,239,230,0.08)', display:'flex', flexDirection:'column', overflow:'hidden' }}>

            {/* Sub-tabs — desktop shows Intentions·Reviews; mobile adds Calendar as first */}
            <div style={{ display:'flex', borderBottom:'0.5px solid rgba(245,239,230,0.08)', padding:'0 18px', flexShrink:0 }}>
              {/* Calendar tab — mobile only */}
              <button className="journal-mobile-tabs" onClick={()=>setLeftTab('calendar')}
                style={{ background:'none', border:'none', borderBottom:leftTab==='calendar'?'2px solid #c4714f':'2px solid transparent', color:leftTab==='calendar'?'#f5efe6':'rgba(245,239,230,0.42)', fontFamily:'Inter, sans-serif', fontSize:'0.875rem', fontWeight:leftTab==='calendar'?600:400, cursor:'pointer', padding:'14px 20px 12px', transition:'all 0.2s', marginRight:'4px', alignItems:'center' }}
              >Calendar</button>
              {['intentions','reviews'].map(tab => (
                <button key={tab} onClick={()=>setLeftTab(tab)}
                  style={{ background:'none', border:'none', borderBottom:leftTab===tab?'2px solid #c4714f':'2px solid transparent', color:leftTab===tab?'#f5efe6':'rgba(245,239,230,0.42)', fontFamily:'Inter, sans-serif', fontSize:'0.875rem', fontWeight:leftTab===tab?600:400, cursor:'pointer', padding:'14px 20px 12px', transition:'all 0.2s', marginRight:'4px' }}
                >{tab==='intentions'?'Intentions':'Reviews'}</button>
              ))}
            </div>

            {/* Tab content */}
            <div style={{ overflowY:'auto', flex:1, padding:'18px 16px' }}>

              {leftTab === 'calendar' && (
                <div>
                  {/* Calendar header */}
                  <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:'12px' }}>
                    <h2 className="font-serif text-cream" style={{ fontSize:'1rem', fontWeight:600, margin:0 }}>Journal</h2>
                    <div style={{ display:'flex', alignItems:'center', gap:'6px' }}>
                      <button onClick={prevMonth} style={{ background:'rgba(245,239,230,0.07)', border:'none', color:'#f5efe6', borderRadius:'8px', padding:'4px 9px', cursor:'pointer', fontSize:'1rem', transition:'background 0.2s' }}>‹</button>
                      <span className="font-serif text-cream" style={{ fontSize:'0.84rem', fontWeight:600, minWidth:'100px', textAlign:'center' }}>{MONTH_NAMES[calMonth]} {calYear}</span>
                      <button onClick={nextMonth} style={{ background:'rgba(245,239,230,0.07)', border:'none', color:'#f5efe6', borderRadius:'8px', padding:'4px 9px', cursor:'pointer', fontSize:'1rem', transition:'background 0.2s' }}>›</button>
                    </div>
                  </div>
                  {/* Day headers */}
                  <div style={{ display:'grid', gridTemplateColumns:'repeat(7, 1fr)', gap:'3px', marginBottom:'3px' }}>
                    {DAY_NAMES.map(d => (
                      <div key={d} style={{ textAlign:'center', color:'rgba(245,239,230,0.28)', fontSize:'0.65rem', fontWeight:600, letterSpacing:'0.04em', padding:'3px 0' }}>{d}</div>
                    ))}
                  </div>
                  {/* Calendar grid */}
                  <div style={{ display:'grid', gridTemplateColumns:'repeat(7, 1fr)', gap:'3px', marginBottom:'12px' }}>
                    {cells.map((day, idx) => {
                      if (!day) return <div key={`empty-${idx}`} />;
                      const ds       = `${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
                      const entry    = loadJournalEntry(ds);
                      const hasEntry = entryDates.has(ds) || !!entry;
                      const isToday  = ds === today;
                      const isSel    = day === selectedDay;
                      const tint     = entry && ENERGY_TINTS[entry.energyLevel];
                      let bg, tc, sub;
                      if (isToday)   { bg='rgba(58,38,26,0.75)'; tc='#f5efe6'; sub='today'; }
                      else if (tint) { bg=tint.bg; tc=tint.text; sub=tint.label; }
                      else           { bg='transparent'; tc=hasEntry?'rgba(245,239,230,0.55)':'rgba(245,239,230,0.2)'; sub=null; }
                      const border  = isToday ? '1px solid rgba(212,168,83,0.4)' : isSel ? '1px solid rgba(212,168,83,0.55)' : tint ? `1px solid ${tint.text}30` : '1px solid transparent';
                      const overlay = isSel ? 'rgba(212,168,83,0.12)' : null;
                      return (
                        <button key={day}
                          onClick={()=>{ if(hasEntry||isToday){ setSelectedDay(day===selectedDay?null:day); setDeleteConfirm(false); setEditMode(false); setEditData(null); } }}
                          style={{ display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', padding:'4px 2px', borderRadius:'9px', cursor:(hasEntry||isToday)?'pointer':'default', background:overlay?overlay:bg, border, transition:'all 0.15s', minHeight:'36px', outline:'none' }}
                        >
                          <span style={{ fontSize:'11px', fontWeight:isToday?700:400, color:tc, fontFamily:'Inter, sans-serif', lineHeight:1 }}>{day}</span>
                          {sub && <span style={{ fontSize:'9px', color:tc, opacity:0.8, marginTop:'2px', fontFamily:'Inter, sans-serif', lineHeight:1 }}>{sub}</span>}
                        </button>
                      );
                    })}
                  </div>
                  {/* Legend */}
                  <div style={{ display:'flex', alignItems:'center', gap:'6px', flexWrap:'wrap', paddingBottom:'12px', marginBottom:'14px', borderBottom:'0.5px solid rgba(245,239,230,0.08)' }}>
                    <span style={{ color:'rgba(245,239,230,0.32)', fontSize:'0.65rem', fontFamily:'Inter, sans-serif' }}>Energy:</span>
                    {(['good','neutral','tired','drained']).map(k => (
                      <div key={k} style={{ display:'flex', alignItems:'center', gap:'3px' }}>
                        <div style={{ width:'11px', height:'11px', borderRadius:'2px', background:ENERGY_TINTS[k].bg, border:`1px solid ${ENERGY_TINTS[k].text}45` }} />
                        <span style={{ color:'rgba(245,239,230,0.42)', fontSize:'0.65rem', fontFamily:'Inter, sans-serif' }}>{ENERGY_TINTS[k].label}</span>
