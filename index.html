                    style={{ display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', padding:'4px 2px', borderRadius:'9px', cursor:(hasEntry||isToday)?'pointer':'default', background:overlay?overlay:bg, border, transition:'all 0.15s', minHeight:'36px', outline:'none' }}
                  >
                    <span style={{ fontSize:'11px', fontWeight:isToday?700:400, color:tc, fontFamily:'Inter, sans-serif', lineHeight:1 }}>{day}</span>
                    {sub && <span style={{ fontSize:'9px', color:tc, opacity:0.8, marginTop:'2px', fontFamily:'Inter, sans-serif', lineHeight:1 }}>{sub}</span>}
                  </button>
                );
              })}
            </div>

            {/* Legend + export/clear */}
            <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', gap:'10px', flexWrap:'wrap', paddingBottom:'14px', marginBottom:'18px', borderBottom:'0.5px solid rgba(245,239,230,0.08)' }}>
              <div style={{ display:'flex', alignItems:'center', gap:'8px', flexWrap:'wrap' }}>
                <span style={{ color:'rgba(245,239,230,0.32)', fontSize:'0.68rem', fontFamily:'Inter, sans-serif' }}>Energy:</span>
                {(['good','neutral','tired','drained']).map(k => (
                  <div key={k} style={{ display:'flex', alignItems:'center', gap:'4px' }}>
                    <div style={{ width:'13px', height:'13px', borderRadius:'3px', background:ENERGY_TINTS[k].bg, border:`1px solid ${ENERGY_TINTS[k].text}45` }} />
                    <span style={{ color:'rgba(245,239,230,0.42)', fontSize:'0.68rem', fontFamily:'Inter, sans-serif' }}>{ENERGY_TINTS[k].label}</span>
                  </div>
                ))}
                <div style={{ display:'flex', alignItems:'center', gap:'4px' }}>
                  <div style={{ width:'13px', height:'13px', borderRadius:'3px', border:'1px dashed rgba(245,239,230,0.18)' }} />
                  <span style={{ color:'rgba(245,239,230,0.42)', fontSize:'0.68rem', fontFamily:'Inter, sans-serif' }}>No entry</span>
                </div>
              </div>
              <div style={{ display:'flex', gap:'7px', flexShrink:0 }}>
                <button onClick={exportJournal} style={{ background:'rgba(212,168,83,0.1)', color:'#d4a853', border:'1px solid rgba(212,168,83,0.2)', borderRadius:'8px', padding:'5px 10px', fontSize:'0.72rem', fontWeight:600, cursor:'pointer', fontFamily:'Inter, sans-serif', transition:'all 0.2s', whiteSpace:'nowrap' }}
                  onMouseEnter={e=>e.currentTarget.style.background='rgba(212,168,83,0.18)'}
                  onMouseLeave={e=>e.currentTarget.style.background='rgba(212,168,83,0.1)'}
                >Export</button>
                <button onClick={clearAllEntries} style={{ background:confirmClear?'rgba(232,152,122,0.12)':'rgba(245,239,230,0.04)', color:confirmClear?'#e8987a':'rgba(245,239,230,0.28)', border:confirmClear?'1px solid rgba(232,152,122,0.3)':'1px solid rgba(245,239,230,0.08)', borderRadius:'8px', padding:'5px 10px', fontSize:'0.72rem', cursor:'pointer', fontFamily:'Inter, sans-serif', transition:'all 0.2s', whiteSpace:'nowrap' }}>
                  {confirmClear ? 'Confirm clear?' : 'Clear all'}
                </button>
              </div>
            </div>

            {/* Entry viewer — multi-entry */}
            {selectedDay && calEntries.length > 0 ? (
              <div className="fade-in" style={{ marginBottom:'28px' }}>
                <p className="font-serif" style={{ color:'#d4a853', fontSize:'0.95rem', fontWeight:600, marginBottom:'12px' }}>{formatDateNice(selectedDateStr)}</p>
                {calEntries.map(entry => {
                  const id = entry.id;
                  const expanded = calExpandedId === id;
                  const editing  = calEditingId === id;
                  const isCheckin = entry.flowType !== 'emotional';
                  const flowLabel = isCheckin ? 'Check in' : 'Explore a feeling';
                  const preview = isCheckin ? (entry.prompts||[])[0]?.answer||'' : (entry.emotionalFlow||[])[0]?.answer||'';
                  const time = entry.createdAt ? (() => { try { return new Date(entry.createdAt).toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit',hour12:true}).toLowerCase(); } catch { return ''; } })() : '';
                  return (
                    <div key={id} style={{ background:'rgba(245,239,230,0.05)', border:`1px solid ${expanded?'rgba(196,113,79,0.28)':'rgba(245,239,230,0.09)'}`, borderRadius:'14px', marginBottom:'10px', overflow:'hidden', transition:'border-color 0.2s' }}>
                      <div onClick={() => { if (!editing) { setCalExpandedId(expanded?null:id); setCalDelConfirm(null); } }}
                        style={{ display:'flex', alignItems:'center', gap:'8px', padding:'12px 16px', cursor:editing?'default':'pointer', userSelect:'none' }}>
                        <span style={{ background:'rgba(196,113,79,0.15)', color:'#e8987a', borderRadius:'20px', padding:'2px 9px', fontSize:'0.68rem', fontWeight:600, fontFamily:'Inter, sans-serif', flexShrink:0 }}>{flowLabel}</span>
                        {time && <span style={{ color:'rgba(245,239,230,0.3)', fontSize:'0.72rem', fontFamily:'Inter, sans-serif' }}>{time}</span>}
                        {isCheckin && entry.energyLevel && (() => { const t=ENERGY_TINTS[entry.energyLevel]; return <span style={{ background:t?t.bg:'rgba(245,239,230,0.07)', color:t?t.text:'rgba(245,239,230,0.55)', borderRadius:'20px', padding:'2px 8px', fontSize:'0.68rem', fontFamily:'Inter, sans-serif' }}>{energyEmoji[entry.energyLevel]}</span>; })()}
                        <span style={{ color:'rgba(245,239,230,0.22)', fontSize:'0.75rem', marginLeft:'auto' }}>{expanded?'∨':'›'}</span>
                      </div>
                      {!expanded && !editing && preview && (
                        <p style={{ color:'rgba(245,239,230,0.35)', fontSize:'0.79rem', fontFamily:'Inter, sans-serif', lineHeight:1.5, padding:'0 16px 12px', margin:0, overflow:'hidden', display:'-webkit-box', WebkitLineClamp:2, WebkitBoxOrient:'vertical' }}>{preview}</p>
                      )}
                      {expanded && (
                        <div style={{ padding:'0 16px 16px', borderTop:'0.5px solid rgba(245,239,230,0.07)' }} onClick={e=>e.stopPropagation()}>
                          {!editing && (
                            <div style={{ display:'flex', gap:'10px', alignItems:'center', justifyContent:'flex-end', paddingTop:'10px', marginBottom:'12px' }}>
                              {calDelConfirm===id ? (
                                <>
                                  <span style={{ color:'rgba(245,239,230,0.45)', fontSize:'0.74rem', fontFamily:'Inter, sans-serif' }}>Delete?</span>
                                  <button onClick={()=>handleDeleteEntry(id)} style={{ background:'none', border:'none', color:'#e8987a', fontSize:'0.74rem', cursor:'pointer', fontFamily:'Inter, sans-serif' }}>Confirm</button>
                                  <button onClick={()=>setCalDelConfirm(null)} style={{ background:'none', border:'none', color:'rgba(245,239,230,0.35)', fontSize:'0.74rem', cursor:'pointer', fontFamily:'Inter, sans-serif' }}>Cancel</button>
                                </>
                              ) : (
                                <>
                                  {isCheckin && <button onClick={()=>enterEditMode(entry)} style={{ background:'none', border:'none', color:'rgba(245,239,230,0.35)', fontSize:'0.74rem', cursor:'pointer', fontFamily:'Inter, sans-serif' }}>Edit</button>}
                                  <button onClick={()=>handleDeleteEntry(id)} style={{ background:'none', border:'none', color:'rgba(245,239,230,0.22)', fontSize:'0.74rem', cursor:'pointer', fontFamily:'Inter, sans-serif' }}>Delete</button>
                                </>
                              )}
                            </div>
                          )}
                          {editing && editData ? (
                            <div style={{ paddingTop:'8px' }}>
                              <div style={{ display:'flex', flexDirection:'column', gap:'6px', marginBottom:'12px' }}>
                                {[{value:'drained',emoji:'🪫',label:'Completely drained'},{value:'tired',emoji:'😴',label:'Tired but okay'},{value:'neutral',emoji:'😐',label:'Neutral'},{value:'good',emoji:'✨',label:'Surprisingly good'}].map(opt=>(
                                  <button key={opt.value} onClick={()=>setEditData(d=>({...d,energyLevel:opt.value}))}
                                    style={{ display:'flex', alignItems:'center', gap:'10px', background:editData.energyLevel===opt.value?'rgba(196,113,79,0.18)':'rgba(245,239,230,0.04)', border:editData.energyLevel===opt.value?'1px solid rgba(196,113,79,0.5)':'1px solid rgba(245,239,230,0.1)', borderRadius:'10px', padding:'9px 13px', cursor:'pointer', textAlign:'left', transition:'all 0.15s' }}>
                                    <span style={{ fontSize:'1rem' }}>{opt.emoji}</span><span style={{ color:editData.energyLevel===opt.value?'#f5efe6':'rgba(245,239,230,0.55)', fontSize:'0.84rem', fontFamily:'Inter, sans-serif' }}>{opt.label}</span>
                                  </button>
                                ))}
                              </div>
                              <div style={{ display:'flex', flexDirection:'column', gap:'6px', marginBottom:'16px' }}>
                                {[{value:'overstimulated',emoji:'🌀',label:'Overstimulated'},{value:'foggy',emoji:'🌫️',label:'Foggy and kind of blank'},{value:'clear',emoji:'🙂',label:'Clear enough'}].map(opt=>(
                                  <button key={opt.value} onClick={()=>setEditData(d=>({...d,mentalState:opt.value}))}
                                    style={{ display:'flex', alignItems:'center', gap:'10px', background:editData.mentalState===opt.value?'rgba(196,113,79,0.18)':'rgba(245,239,230,0.04)', border:editData.mentalState===opt.value?'1px solid rgba(196,113,79,0.5)':'1px solid rgba(245,239,230,0.1)', borderRadius:'10px', padding:'9px 13px', cursor:'pointer', textAlign:'left', transition:'all 0.15s' }}>
                                    <span style={{ fontSize:'1rem' }}>{opt.emoji}</span><span style={{ color:editData.mentalState===opt.value?'#f5efe6':'rgba(245,239,230,0.55)', fontSize:'0.84rem', fontFamily:'Inter, sans-serif' }}>{opt.label}</span>
                                  </button>
                                ))}
                              </div>
                              <div style={{ display:'flex', flexDirection:'column', gap:'14px', marginBottom:'16px' }}>
                                {editData.prompts.map((p,i)=>(
                                  <div key={i}>
                                    <p className="font-serif" style={{ color:'rgba(245,239,230,0.48)', fontSize:'0.87rem', fontStyle:'italic', marginBottom:'5px' }}>{p.question}</p>
                                    <textarea value={p.answer} onChange={e=>setEditData(d=>({...d,prompts:d.prompts.map((pr,j)=>j===i?{...pr,answer:e.target.value}:pr)}))}
                                      style={{ width:'100%', boxSizing:'border-box', background:'rgba(245,239,230,0.06)', border:'1px solid rgba(245,239,230,0.12)', borderRadius:'10px', padding:'11px', color:'#f5efe6', fontSize:'0.88rem', lineHeight:1.6, resize:'vertical', outline:'none', minHeight:'80px', fontFamily:'Inter, sans-serif' }} />
                                  </div>
                                ))}
                              </div>
                              <textarea value={editData.notes||''} onChange={e=>setEditData(d=>({...d,notes:e.target.value}))} placeholder="Notes..."
                                style={{ width:'100%', boxSizing:'border-box', background:'rgba(245,239,230,0.06)', border:'1px solid rgba(245,239,230,0.12)', borderRadius:'10px', padding:'11px', color:'#f5efe6', fontSize:'0.88rem', lineHeight:1.6, resize:'vertical', outline:'none', minHeight:'70px', fontFamily:'Inter, sans-serif', marginBottom:'12px' }} />
                              <div style={{ display:'flex', gap:'10px' }}>
                                <button onClick={()=>handleSaveEdit(entry)} style={{ flex:1, background:'#c4714f', color:'#f5efe6', border:'none', borderRadius:'12px', padding:'12px', fontSize:'0.88rem', fontWeight:600, cursor:'pointer', fontFamily:'Inter, sans-serif' }}>Save</button>
                                <button onClick={()=>{setCalEditingId(null);setEditData(null);}} style={{ flex:1, background:'transparent', color:'rgba(245,239,230,0.5)', border:'1px solid rgba(245,239,230,0.15)', borderRadius:'12px', padding:'12px', fontSize:'0.88rem', cursor:'pointer', fontFamily:'Inter, sans-serif' }}>Cancel</button>
                              </div>
                            </div>
                          ) : (
                            <div>
                              {isCheckin && (entry.energyLevel||entry.mentalState) && (
                                <div style={{ display:'flex', gap:'7px', flexWrap:'wrap', marginBottom:'14px' }}>
                                  {entry.energyLevel && (() => { const t=ENERGY_TINTS[entry.energyLevel]; return <span style={{ background:t?t.bg:'rgba(245,239,230,0.07)', color:t?t.text:'rgba(245,239,230,0.65)', borderRadius:'20px', padding:'4px 11px', fontSize:'0.79rem', fontFamily:'Inter, sans-serif', border:t?`1px solid ${t.text}30`:'none' }}>{energyEmoji[entry.energyLevel]} {energyLabel[entry.energyLevel]}</span>; })()}
                                  {entry.mentalState && <span style={{ background:'rgba(245,239,230,0.07)', borderRadius:'20px', padding:'4px 11px', fontSize:'0.79rem', color:'rgba(245,239,230,0.6)', fontFamily:'Inter, sans-serif' }}>{mentalEmoji[entry.mentalState]} {mentalLabel[entry.mentalState]}</span>}
                                  {entry.emotionTone && <span style={{ background:'rgba(245,239,230,0.07)', borderRadius:'20px', padding:'4px 11px', fontSize:'0.79rem', color:'rgba(245,239,230,0.6)', fontFamily:'Inter, sans-serif' }}>{emotionEmoji[entry.emotionTone]} {emotionLabel[entry.emotionTone]}</span>}
                                  {entry.stressIntensity && <span style={{ background:'rgba(245,239,230,0.07)', borderRadius:'20px', padding:'4px 11px', fontSize:'0.79rem', color:'rgba(245,239,230,0.6)', fontFamily:'Inter, sans-serif' }}>{stressEmoji[entry.stressIntensity]} {stressLabel[entry.stressIntensity]}</span>}
                                </div>
                              )}
                              {isCheckin && (
                                <div style={{ display:'flex', flexDirection:'column', gap:'14px' }}>
                                  {(entry.prompts||[]).map((p,i)=>(
                                    <div key={i}>
                                      <p className="font-serif" style={{ color:'rgba(245,239,230,0.48)', fontSize:'0.87rem', fontStyle:'italic', marginBottom:'4px' }}>{p.question}</p>
                                      <p style={{ color:'#f5efe6', fontSize:'0.9rem', lineHeight:1.65, fontFamily:'Inter, sans-serif', whiteSpace:'pre-wrap' }}>{p.answer||<em style={{opacity:0.35}}>No answer written</em>}</p>
                                    </div>
                                  ))}
                                  {entry.notes && (<><div style={{ borderTop:'0.5px solid rgba(245,239,230,0.08)', margin:'14px 0 10px' }} /><p style={{ color:'rgba(245,239,230,0.65)', fontSize:'0.88rem', lineHeight:1.6, fontFamily:'Inter, sans-serif', whiteSpace:'pre-wrap' }}>{entry.notes}</p></>)}
                                  {entry.recommendedActivity && (<><div style={{ borderTop:'0.5px solid rgba(245,239,230,0.08)', margin:'14px 0 10px' }} /><p style={{ color:'rgba(245,239,230,0.36)', fontSize:'0.79rem', fontFamily:'Inter, sans-serif' }}>Chose that day: {entry.recommendedActivity.emoji} {entry.recommendedActivity.name}</p></>)}
                                </div>
                              )}
                              {!isCheckin && (
                                <div style={{ display:'flex', flexDirection:'column', gap:'12px' }}>
                                  {(entry.emotionalFlow||[]).map((f,i)=>f.answer?<div key={i}><p style={{ color:'#f5efe6', fontSize:'0.9rem', lineHeight:1.65, fontFamily:'Inter, sans-serif', whiteSpace:'pre-wrap' }}>{f.answer}</p></div>:null)}
                                </div>
                              )}
                            </div>
                          )}
                        </div>
                      )}
                    </div>
                  );
                })}
              </div>
            ) : (
              <div style={{ display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', padding:'36px 20px', opacity:0.28 }}>
                <div style={{ marginBottom:'7px' }}><CandleFlame width={40} height={52} /></div>
                <p style={{ color:'#f5efe6', fontFamily:'Inter, sans-serif', fontSize:'0.83rem' }}>Select a day to read that entry.</p>
              </div>
            )}
          </div>

          {/* Review overlay */}
          {renderReviewOverlay()}
        </div>
      );
    }

    // ─────────────────────────────────────────────
    //  APP
    // ─────────────────────────────────────────────
    function App() {
      const [screen, setScreen]     = useState('today');
      const [currentQ, setCurrentQ] = useState(0);
      const [answers, setAnswers]   = useState({});
      const [fading, setFading]     = useState(false);
      const [recs, setRecs]         = useState([]);
      const [customActivities, setCustomActivities] = useState(() => loadCustomActivities());
      const [journalInfluence, setJournalInfluence] = useState(null);
      const [disabledActivities, setDisabledActivities] = useState(() => {
        try { const s = localStorage.getItem('tonight-disabled'); return new Set(s ? JSON.parse(s) : []); } catch { return new Set(); }
      });
      const [hiddenActivities, setHiddenActivities] = useState(() => {
        try { const s = localStorage.getItem('tonight-hidden'); return new Set(s ? JSON.parse(s) : []); } catch { return new Set(); }
      });

      // Returning-user: check recent journal entry first, fall back to old quiz answers
      const lastEntry = (() => {
        for (let i = 1; i <= 7; i++) {
          const d = new Date(); d.setDate(d.getDate() - i);
          const ds = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
          const e = loadJournalEntry(ds);
          if (e) return e;
        }
        return null;
      })();

      const lastEnergy = (() => {
        if (lastEntry) return null;
        try {
          const s = localStorage.getItem('tonight-answers');
          const a = s ? JSON.parse(s) : null;
          return a?.energy ? ENERGY_LABELS[a.energy] : null;
        } catch { return null; }
      })();

      function transition(fn) {
        setFading(true);
        setTimeout(() => { fn(); setFading(false); }, 320);
      }

      function handleWrite() {
        transition(() => setScreen('flowSelector'));
      }

      function handleSkip() {
        transition(() => { setAnswers({}); setCurrentQ(0); setScreen('questions'); });
      }

      function handleBack() {
        if (currentQ > 0) transition(() => setCurrentQ(q => q - 1));
      }

      function handleAnswer(id, value) {
        const newAnswers = { ...answers, [id]: value };
        setAnswers(newAnswers);

        if (currentQ < QUESTIONS.length - 1) {
          transition(() => setCurrentQ(q => q + 1));
        } else {
          // Check for today's journal entry and apply keyword boosts
          let boosts = null;
          let influence = null;
          const today = todayStr();
          const todayEntry = loadJournalEntry(today);
          if (todayEntry && todayEntry.prompts) {
            const allText = todayEntry.prompts.map(p => p.answer || '').join(' ');
            const b = getJournalBoosts(allText);
            if (b.influence) { boosts = b; influence = b.influence; }
          }

          // Compute intention boosts from week + month intention localStorage
          const intentionB = getIntentionBoosts();

          // Get ranked recommendations without intention boosts to detect ranking change
          const rNoIntent = getRecommendations(newAnswers, customActivities, boosts, disabledActivities, hiddenActivities, null);
          const r = getRecommendations(newAnswers, customActivities, boosts, disabledActivities, hiddenActivities, intentionB);

          // Show intention note only if the top pick changed due to intention boosts
          let intentionNote = null;
          if (intentionB && r.length > 0 && rNoIntent.length > 0 && r[0].id !== rNoIntent[0].id) {
            const themes = intentionB.themes;
            const words  = intentionB.focusWords;
            const label  = words.length > 0 ? words[0] : (themes.length > 0 ? themes[0] : 'your intention');
            intentionNote = `Based on your intention around ${label}, we leaned toward ${r[0].name.toLowerCase()}.`;
          }

          setRecs(r);
          setJournalInfluence(influence || intentionNote);
          try { localStorage.setItem('tonight-answers', JSON.stringify(newAnswers)); } catch {}

          // Write recommended activity back to today's journal entry
          if (r.length > 0 && todayEntry) {
            saveJournalEntry({ ...todayEntry, recommendedActivity: { id: r[0].id, name: r[0].name, emoji: r[0].emoji } });
          }

          transition(() => setScreen('results'));
        }
      }

      function handleRestart() {
        transition(() => { setScreen('today'); setAnswers({}); setCurrentQ(0); setJournalInfluence(null); });
      }

      function handleSaveActivity(activity) {
        const updated = [...customActivities, activity];
        setCustomActivities(updated);
        saveCustomActivities(updated);
      }

      function handleDeleteActivity(id) {
        const updated = customActivities.filter(a => a.id !== id);
        setCustomActivities(updated);
        saveCustomActivities(updated);
      }

      function handleToggleDisabled(id) {
        setDisabledActivities(prev => {
          const next = new Set(prev);
          if (next.has(id)) next.delete(id); else next.add(id);
          try { localStorage.setItem('tonight-disabled', JSON.stringify([...next])); } catch {}
          return next;
        });
      }

      function handleHideActivity(id) {
        setHiddenActivities(prev => {
          const next = new Set(prev);
          next.add(id);
          try { localStorage.setItem('tonight-hidden', JSON.stringify([...next])); } catch {}
          return next;
        });
      }

      function handleNavClick(id) {
        if (id === 'today')      transition(() => { setScreen('today'); setAnswers({}); setCurrentQ(0); });
        if (id === 'journal')    transition(() => setScreen('calendar'));
      }

      function handleFindActivityFromJournal(journalData) {
        const preAnswers = { energy: journalData.energyLevel, mental: journalData.mentalState };
        transition(() => { setAnswers(preAnswers); setCurrentQ(2); setScreen('questions'); });
      }

      return (
        <div style={{ minHeight: '100vh', background: '#1a1a2e' }}>
          <TopNav screen={screen} onNav={handleNavClick} />
          <div style={{ paddingTop: '56px', display: 'flex', flexDirection: 'column', alignItems: 'center' }}>
            {fading ? (
              <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', minHeight: 'calc(100vh - 56px)' }}>
                <div className="pulsing" style={{ display:'flex', alignItems:'center', justifyContent:'center' }}><CandleFlame width={40} height={52} /></div>
              </div>
            ) : (
              <>
                {screen === 'today' && (
                  <TodayScreen
                    onWrite={handleWrite}
                    onSkip={handleSkip}
                  />
                )}
                {screen === 'questions' && (
                  <QuestionScreen
                    question={QUESTIONS[currentQ]}
                    onAnswer={handleAnswer}
                    onBack={handleBack}
                    selectedAnswer={answers[QUESTIONS[currentQ]?.id]}
                    currentIndex={currentQ}
                    total={QUESTIONS.length}
                  />
                )}
                {screen === 'results' && (
                  <ResultScreen
                    recommendations={recs}
                    answers={answers}
                    onRestart={handleRestart}
                    journalInfluence={journalInfluence}
                    onCalendar={() => transition(() => setScreen('calendar'))}
                  />
                )}
                {screen === 'flowSelector' && (
                  <FlowSelectorScreen
                    onCheckin={() => transition(() => setScreen('journal'))}
                    onEmotional={() => transition(() => setScreen('emotionalFlow'))}
                    onBack={() => transition(() => setScreen('today'))}
                  />
                )}
                {screen === 'emotionalFlow' && (
                  <EmotionalFlowScreen
                    onDone={() => transition(() => setScreen('calendar'))}
                    onBack={() => transition(() => setScreen('flowSelector'))}
                    onFindActivity={() => transition(() => { setAnswers({}); setCurrentQ(0); setScreen('questions'); })}
                  />
                )}
                {screen === 'journal' && (
                  <JournalScreen
                    onDone={() => transition(() => setScreen('calendar'))}
                    onBack={() => transition(() => setScreen('flowSelector'))}
                    onFindActivity={handleFindActivityFromJournal}
                  />
                )}
                {screen === 'calendar' && (
                  <CalendarScreen
                    onBack={() => transition(() => setScreen('today'))}
                    onWrite={() => transition(() => setScreen('flowSelector'))}
                  />
                )}
              </>
            )}
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
  <script>
    (function() {
      var overlay = document.getElementById('loading-overlay');
      if (!overlay) return;
      setTimeout(function() {
        overlay.style.opacity = '0';
        setTimeout(function() { if (overlay.parentNode) overlay.parentNode.removeChild(overlay); }, 600);
      }, 2000);
    })();
  </script>
</body>
</html>
