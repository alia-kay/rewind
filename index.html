    const TIME_HOURS = { '1hr': 1, '2hr': 2, '3hr': 3 };

    function scoreActivity(activity, answers) {
      const { energy, mental, social, creative, time } = answers;
      const timeHours = TIME_HOURS[time];
      let score = 0;

      // ── Hard exclusions ──
      if (activity.minTime > timeHours) return -999;
      if (!activity.energy.includes(energy)) return -999;

      // Social hard exclusions
      if (social === 'together' &&
          !activity.social.includes('together') &&
          !activity.social.includes('either')) return -999;
      if (social === 'solo' &&
          activity.social.length === 1 &&
          activity.social[0] === 'together') return -999;

      // Drained: exclude high-engagement activities
      if (energy === 'drained') {
        if (['board-games', 'baking', 'write', 'learn', 'documentary', 'nonfiction', 'walk'].includes(activity.id))
          return -999;
        if (['bath', 'yoga', 'series', 'embroidery', 'podcast', 'fiction', 'journal', 'husband-games'].includes(activity.id))
          score += 20;
      }

      // ── Mental state ──
      if (activity.mental.includes(mental)) score += 12;
      else score -= 18;

      if (mental === 'overstimulated') {
        if (['clay', 'embroidery', 'yoga', 'doodle', 'bath', 'journal'].includes(activity.id))  score += 28;
        if (['nonfiction', 'learn', 'board-games', 'interview'].includes(activity.id))           score -= 20;
      }
      if (mental === 'foggy') {
        if (['podcast', 'husband-games', 'series', 'bath', 'yoga', 'embroidery'].includes(activity.id)) score += 22;
        if (['nonfiction', 'learn', 'write', 'clay', 'doodle', 'board-games'].includes(activity.id))    score -= 16;
      }
      if (mental === 'clear') {
        if (['nonfiction', 'learn', 'write', 'documentary', 'board-games', 'baking'].includes(activity.id)) score += 15;
      }

      // ── Creative / mode match ──
      if (activity.creative.includes(creative)) score += 22;
      else score -= 12;

      if (creative === 'hands') {
        if (['clay', 'baking', 'embroidery', 'doodle', 'write', 'journal'].includes(activity.id)) score += 22;
      }
      if (creative === 'absorb') {
        if (['fiction', 'nonfiction', 'podcast', 'interview', 'documentary', 'learn'].includes(activity.id)) score += 18;
      }
      if (creative === 'zoneout') {
        if (['series', 'husband-games', 'embroidery', 'yoga', 'bath', 'podcast', 'walk', 'movie'].includes(activity.id)) score += 18;
        if (['clay', 'write', 'journal', 'doodle', 'learn', 'baking'].includes(activity.id)) score -= 12;
      }

      // ── Social bonuses ──
      if (social === 'together') {
        if (['movie', 'board-games', 'husband-games', 'baking', 'documentary', 'walk', 'series'].includes(activity.id)) score += 14;
      }
      if (social === 'solo') {
        if (['bath', 'fiction', 'podcast', 'journal', 'clay', 'doodle', 'yoga'].includes(activity.id)) score += 6;
      }

      return score;
    }

                width:  i === current ? '24px' : '8px',
                height: '8px',
                borderRadius: '9999px',
                background: i < current ? '#c4714f' : i === current ? '#d4a853' : 'rgba(245,239,230,0.18)',
              }}
            />
          ))}
        </div>
      );
    }

    function WelcomeScreen({ onStart, lastEnergy }) {
      return (
        <div className="fade-in flex flex-col items-center justify-center min-h-screen px-6 text-center">
          <div style={{ fontSize: '56px', marginBottom: '20px' }}>🌙</div>
          <h1 className="font-serif text-cream mb-3" style={{ fontSize: 'clamp(2.4rem, 8vw, 3.2rem)', fontWeight: 600, letterSpacing: '-0.5px' }}>
            Tonight?
          </h1>
          <p className="font-serif text-cream mb-2" style={{ opacity: 0.65, fontSize: '1.1rem', fontStyle: 'italic', maxWidth: '300px', lineHeight: 1.55 }}>
            The baby's asleep. This time is yours.
          </p>
          <p className="font-serif text-cream mb-10" style={{ opacity: 0.5, fontSize: '1rem', fontStyle: 'italic' }}>
            Let's figure out how to spend it.
          </p>

          {lastEnergy && (
            <div className="mb-8 rounded-2xl px-5 py-4 text-sm text-center" style={{ background: 'rgba(255,255,255,0.05)', border: '1px solid rgba(245,239,230,0.1)', maxWidth: '280px', width: '100%' }}>
              <p style={{ color: 'rgba(245,239,230,0.45)', marginBottom: '4px' }}>Last time you were</p>
              <p className="font-medium" style={{ color: '#d4a853' }}>{lastEnergy}</p>
              <p style={{ color: 'rgba(245,239,230,0.35)', fontSize: '0.78rem', marginTop: '4px' }}>How are you tonight?</p>
            </div>
          )}

          <button
            onClick={onStart}
            className="font-medium"
            style={{
              background: '#c4714f',
              color: '#f5efe6',
              border: 'none',
              borderRadius: '16px',
              padding: '16px 40px',
              fontSize: '1.1rem',
              cursor: 'pointer',
              transition: 'all 0.2s ease',
              boxShadow: '0 4px 24px rgba(196,113,79,0.35)',
            }}
            onMouseEnter={e => { e.target.style.background = '#a35a3a'; e.target.style.transform = 'scale(1.04)'; }}
            onMouseLeave={e => { e.target.style.background = '#c4714f'; e.target.style.transform = 'scale(1)'; }}
          >
            Let's go →
          </button>
        </div>
      );
    }

    function QuestionScreen({ question, onAnswer, currentIndex, total }) {
      return (
        <div className="fade-in w-full px-5" style={{ maxWidth: '480px', paddingTop: '60px', paddingBottom: '40px' }}>
          <ProgressDots current={currentIndex} total={total} />

          <h2 className="font-serif text-cream text-center" style={{ fontSize: 'clamp(1.3rem, 5vw, 1.65rem)', fontWeight: 600, lineHeight: 1.4, marginBottom: '32px', paddingLeft: '8px', paddingRight: '8px' }}>
            {question.q}
          </h2>

          <div style={{ display: 'flex', flexDirection: 'column', gap: '12px' }}>
            {question.options.map(opt => (
              <button
                key={opt.value}
                onClick={() => onAnswer(question.id, opt.value)}
                style={{
                  display: 'flex',
                  alignItems: 'center',
                  gap: '16px',
                  background: 'rgba(245,239,230,0.05)',
                  border: '1px solid rgba(245,239,230,0.1)',
                  borderRadius: '16px',
                  padding: '16px 20px',
                  cursor: 'pointer',
                  textAlign: 'left',
                  width: '100%',
                  transition: 'all 0.2s ease',
                  color: '#f5efe6',
                }}
                onMouseEnter={e => {
                  e.currentTarget.style.background = 'rgba(245,239,230,0.09)';
                  e.currentTarget.style.borderColor = 'rgba(196,113,79,0.5)';
                  e.currentTarget.style.transform = 'translateY(-1px)';
                  e.currentTarget.style.boxShadow = '0 4px 20px rgba(0,0,0,0.2)';
                }}
                onMouseLeave={e => {
                  e.currentTarget.style.background = 'rgba(245,239,230,0.05)';
                  e.currentTarget.style.borderColor = 'rgba(245,239,230,0.1)';
                  e.currentTarget.style.transform = 'translateY(0)';
                  e.currentTarget.style.boxShadow = 'none';
                }}
              >
                <span style={{ fontSize: '1.6rem', width: '36px', textAlign: 'center', flexShrink: 0 }}>
                  {opt.emoji}
                </span>
                <span style={{ fontSize: '1rem', fontWeight: 500 }}>{opt.label}</span>
              </button>
            ))}
          </div>
        </div>
      );
    }

    function ActivityCard({ activity, answers, isPrimary }) {
      const why = generateWhy(activity, answers);

      return (
        <div
          className="fade-in"
          style={{
            background: isPrimary ? '#f5efe6' : 'rgba(245,239,230,0.06)',
            border: isPrimary ? 'none' : '1px solid rgba(245,239,230,0.12)',
            borderRadius: '24px',
            padding: '28px',
            marginBottom: isPrimary ? '0' : '0',
          }}
        >
          {/* Header */}
          <div style={{ display: 'flex', alignItems: 'flex-start', gap: '14px', marginBottom: '16px' }}>
            <span style={{ fontSize: '2.4rem', marginTop: '2px', flexShrink: 0 }}>{activity.emoji}</span>
            <div>
              {isPrimary && (
                <span
                  style={{
                    display: 'inline-block',
                    fontSize: '0.72rem',
                    fontWeight: 600,
                    letterSpacing: '0.05em',
                    textTransform: 'uppercase',
                    color: '#c4714f',
                    background: 'rgba(196,113,79,0.12)',
                    borderRadius: '20px',
                    padding: '3px 10px',
                    marginBottom: '6px',
                  }}
                >
                  Tonight's pick
                </span>
              )}
              <h3
                className="font-serif"
                style={{
                  fontSize: isPrimary ? '1.5rem' : '1.25rem',
                  fontWeight: 600,
                  lineHeight: 1.3,
                  color: isPrimary ? '#1a1a2e' : '#f5efe6',
                }}
              >
                {activity.name}
              </h3>
            </div>
          </div>

          {/* Description */}
          <p
            style={{
              fontSize: '0.93rem',
              lineHeight: 1.65,
              marginBottom: '12px',
              color: isPrimary ? 'rgba(26,26,46,0.7)' : 'rgba(245,239,230,0.65)',
            }}
          >
            {activity.description}
          </p>

          {/* Contextual why */}
          <p
            className="font-serif"
            style={{
              fontSize: '0.93rem',
              fontStyle: 'italic',
              lineHeight: 1.6,
              marginBottom: '18px',
              color: isPrimary ? '#a35a3a' : '#d4a853',
              borderLeft: `3px solid ${isPrimary ? '#c4714f' : '#d4a853'}`,
              paddingLeft: '14px',
            }}
          >
            {why}
          </p>

          {/* Starter suggestion */}
          <div
            style={{
              background: isPrimary ? 'rgba(26,26,46,0.05)' : 'rgba(245,239,230,0.04)',
              borderRadius: '14px',
              padding: '14px 16px',
            }}
          >
            <p
              style={{
                fontSize: '0.72rem',
                fontWeight: 600,
                textTransform: 'uppercase',
                letterSpacing: '0.05em',
                color: isPrimary ? 'rgba(26,26,46,0.38)' : 'rgba(245,239,230,0.35)',
                marginBottom: '6px',
              }}
            >
              How to start
            </p>
            <p
              style={{
                fontSize: '0.88rem',
                lineHeight: 1.6,
                color: isPrimary ? 'rgba(26,26,46,0.68)' : 'rgba(245,239,230,0.58)',
              }}
            >
              {activity.starter}
            </p>
          </div>
        </div>
      );
    }

    function ResultScreen({ recommendations, answers, onRestart }) {
      const [showAlts, setShowAlts] = useState(false);
      const [top, ...alts] = recommendations;

      if (!top) {
        return (
          <div className="fade-in w-full px-5 text-center" style={{ maxWidth: '480px', paddingTop: '80px' }}>
            <p className="text-cream font-serif" style={{ opacity: 0.6 }}>Hmm, nothing matched tonight. Try starting over!</p>
            <button onClick={onRestart} style={{ color: '#c4714f', background: 'none', border: 'none', cursor: 'pointer', marginTop: '20px', fontSize: '0.9rem' }}>Start over</button>
          </div>
        );
      }

      return (
        <div className="fade-in w-full px-5" style={{ maxWidth: '480px', paddingTop: '48px', paddingBottom: '48px' }}>
          {/* Header */}
          <div className="text-center" style={{ marginBottom: '28px' }}>
            <p style={{ color: 'rgba(245,239,230,0.4)', fontSize: '0.78rem', fontWeight: 600, letterSpacing: '0.1em', textTransform: 'uppercase', marginBottom: '8px' }}>
              Your evening
            </p>
            <h2 className="font-serif text-cream" style={{ fontSize: 'clamp(1.5rem, 5vw, 2rem)', fontWeight: 600 }}>
              Here's what fits tonight.
            </h2>
          </div>

          {/* Primary recommendation */}
          <ActivityCard activity={top} answers={answers} isPrimary={true} />

          {/* Alternatives */}
          <div style={{ marginTop: '16px', display: 'flex', flexDirection: 'column', gap: '12px' }}>
            {!showAlts && alts.length > 0 && (
              <button
                onClick={() => setShowAlts(true)}
                style={{
                  width: '100%',
                  background: 'transparent',
                  border: '1px solid rgba(245,239,230,0.18)',
                  borderRadius: '16px',
                  padding: '14px 20px',
                  fontSize: '0.92rem',
                  fontWeight: 500,
                  color: 'rgba(245,239,230,0.6)',
                  cursor: 'pointer',
                  transition: 'all 0.2s ease',
                  fontFamily: 'Inter, sans-serif',
                }}
                onMouseEnter={e => { e.target.style.borderColor = 'rgba(245,239,230,0.35)'; e.target.style.color = 'rgba(245,239,230,0.85)'; }}
                onMouseLeave={e => { e.target.style.borderColor = 'rgba(245,239,230,0.18)'; e.target.style.color = 'rgba(245,239,230,0.6)'; }}
              >
                Not feeling it? See other options
              </button>
            )}

            {showAlts && alts.map((rec, i) => (
              <div key={rec.id} className="fade-in">
                <ActivityCard activity={rec} answers={answers} isPrimary={false} />
              </div>
            ))}

            <button
              onClick={onRestart}
              style={{
                background: 'transparent',
                border: 'none',
                color: 'rgba(245,239,230,0.3)',
                cursor: 'pointer',
                fontSize: '0.85rem',
                padding: '8px',
                marginTop: '4px',
                fontFamily: 'Inter, sans-serif',
                transition: 'color 0.2s',
              }}
              onMouseEnter={e => { e.target.style.color = 'rgba(245,239,230,0.6)'; }}
              onMouseLeave={e => { e.target.style.color = 'rgba(245,239,230,0.3)'; }}
            >
              Start over
            </button>
          </div>

          <p className="font-serif text-center" style={{ color: 'rgba(245,239,230,0.2)', fontSize: '0.78rem', fontStyle: 'italic', marginTop: '40px' }}>
            Made for the hours after 7pm
          </p>
        </div>
      );
    }

    // ─────────────────────────────────────────────
    //  APP
    // ─────────────────────────────────────────────
    function App() {
      const [screen, setScreen]       = useState('welcome');
      const [currentQ, setCurrentQ]   = useState(0);
      const [answers, setAnswers]     = useState({});
      const [fading, setFading]       = useState(false);
      const [recs, setRecs]           = useState([]);

      const [lastAnswers] = useState(() => {
        try {
          const s = localStorage.getItem('tonight-answers');
          return s ? JSON.parse(s) : null;
        } catch { return null; }
      });

      const lastEnergy = lastAnswers?.energy ? ENERGY_LABELS[lastAnswers.energy] : null;

      function transition(fn) {
        setFading(true);
        setTimeout(() => { fn(); setFading(false); }, 320);
      }

      function handleStart() {
        transition(() => { setAnswers({}); setCurrentQ(0); setScreen('questions'); });
      }

      function handleAnswer(id, value) {
        const newAnswers = { ...answers, [id]: value };
        setAnswers(newAnswers);

        if (currentQ < QUESTIONS.length - 1) {
          transition(() => setCurrentQ(q => q + 1));
        } else {
          const r = getRecommendations(newAnswers);
          setRecs(r);
          try { localStorage.setItem('tonight-answers', JSON.stringify(newAnswers)); } catch {}
          transition(() => setScreen('results'));
        }
      }

      function handleRestart() {
        transition(() => { setScreen('welcome'); setAnswers({}); setCurrentQ(0); });
      }

      return (
        <div style={{ minHeight: '100vh', background: '#1a1a2e', display: 'flex', flexDirection: 'column', alignItems: 'center' }}>
          {/* Moon logo */}
          {screen !== 'welcome' && (
            <div style={{ position: 'fixed', top: '18px', left: '20px', fontSize: '1.4rem', zIndex: 10, opacity: 0.7 }}>
              🌙
            </div>
          )}

          {/* Content */}
          {fading ? (
            <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', minHeight: '100vh' }}>
              <div className="pulsing" style={{ fontSize: '1.8rem' }}>🌙</div>
            </div>
          ) : (
            <>
              {screen === 'welcome' && (
                <WelcomeScreen onStart={handleStart} lastEnergy={lastEnergy} />
              )}
              {screen === 'questions' && (
                <QuestionScreen
                  question={QUESTIONS[currentQ]}
                  onAnswer={handleAnswer}
                  currentIndex={currentQ}
                  total={QUESTIONS.length}
                />
              )}
              {screen === 'results' && (
                <ResultScreen
                  recommendations={recs}
                  answers={answers}
                  onRestart={handleRestart}
                />
              )}
            </>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
